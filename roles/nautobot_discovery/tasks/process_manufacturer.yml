---
- name: Debug input variables
  debug:
    msg: "Processing manufacturer: vendor={{ device.vendor | default('Unknown') }}, endpoint={{ endpoints.manufacturers }}"
  when: debug | default(false)

- include_tasks: api_lookup.yml
  vars:
    endpoint: "{{ endpoints.manufacturers }}"
    filters:
      name: "{{ device.vendor | default('Unknown') }}"
    var_name: manufacturer_list

- name: Set existing manufacturer
  set_fact:
    manufacturer: "{{ manufacturer_list[0] if manufacturer_list | length > 0 else {} }}"

- name: Debug manufacturer lookup result
  debug:
    msg: "Manufacturer lookup result: {{ manufacturer }}"
  when: debug | default(false)

- name: Create or update manufacturer
  include_tasks: api_create_or_update.yml
  vars:
    endpoint: "{{ endpoints.manufacturers }}"
    obj_id: "{{ manufacturer.id if manufacturer.id is defined }}"
    body:
      name: "{{ device.vendor | default('Unknown') }}"
      slug: "{{ (device.vendor | default('Unknown') | lower | replace(' ', '-')) }}"
    var_name: manufacturer
  when: manufacturer_list | length == 0 or manufacturer.id is defined

- name: Handle existing manufacturer on 400 error
  block:
    - name: Lookup manufacturer by name after 400 error
      ansible.builtin.uri:
        url: "{{ api_base_url }}{{ endpoints.manufacturers.path }}?name={{ device.vendor | default('Unknown') | urlencode }}"
        headers: "{{ api_headers }}"
        method: GET
        validate_certs: "{{ nautobot_validate_certs }}"
        return_content: yes
        status_code: 200
      register: retry_result
      when: api_result.status == 400 and api_result.json is defined and 'name' in api_result.json and 'already exists' in api_result.json.name[0]

    - name: Set manufacturer from retry result
      set_fact:
        manufacturer: "{{ retry_result.json.results[0] if retry_result.json.results | length > 0 else {} }}"
      when: retry_result.status == 200
  when: api_result.status == 400 and api_result.json is defined and 'name' in api_result.json and 'already exists' in api_result.json.name[0]

- name: Debug manufacturer after retry
  debug:
    msg: "Manufacturer after retry: {{ manufacturer }}"
  when: debug | default(false)

- name: Set manufacturer ID
  set_fact:
    manufacturer_id: "{{ manufacturer.id | default(omit) }}"
  when: manufacturer.id is defined