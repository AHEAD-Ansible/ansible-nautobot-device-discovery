---
# Reusable task to process an IP address for Nautobot, ensuring it exists and is optionally assigned to an interface.
# Variables required:
# - ip: The IP address with prefix (e.g., '10.0.0.1/24')
# - nautobot_url: Nautobot API URL
# - nautobot_token: Nautobot API token
# - nautobot_discovery_namespace: Namespace for IP lookup (default in defaults/main.yml)
# Optional variables:
# - device_id: Device ID for conflict checking
# - interface_id: Interface ID for IP assignment (if defined, IP is assigned to this interface)
# - tenant: Tenant name for IP assignment
# - vrf: VRF name for IP assignment
# Outputs:
# - ip_obj: The IP address object (with 'id', 'address', etc.)

- name: Parse IP address and prefix
  ansible.builtin.include_tasks: parse_ip.yml

- name: Ensure parent prefix exists
  include_tasks: process_prefix.yml

- name: Validate parent prefix
  ansible.builtin.set_fact:
    parent_prefix: "{{ lookup('networktocode.nautobot.lookup', 'prefixes', api_filter='prefix=' + ip_prefix + ' namespace=' + nautobot_discovery_namespace, api_endpoint=nautobot_url, token=nautobot_token, raw_data=True, num_retries=3) | default({}) }}"
  when: ip_prefix is defined

- name: Debug parent prefix mismatch
  ansible.builtin.debug:
    msg: "Parent prefix {{ ip_prefix }} not found or incorrect for IP {{ ip }} in namespace {{ nautobot_discovery_namespace }}. Expected prefix: {{ parent_prefix.prefix if parent_prefix.prefix is defined else 'None' }}."
  when: parent_prefix | length == 0 or parent_prefix.prefix != ip_prefix

- name: Look up IP address in Nautobot
  ansible.builtin.include_tasks: lookup_and_normalize.yml
  vars:
    endpoint: 'ip-addresses'
    filter_query: "address={{ ip }} namespace={{ nautobot_discovery_namespace }}{% if vrf is defined and vrf != '0' and vrf in nautobot_discovery_vrf_ids %} vrfs={{ nautobot_discovery_vrf_ids[vrf] }}{% endif %}{% if tenant is defined and tenant in nautobot_discovery_tenant_ids %} tenant={{ nautobot_discovery_tenant_ids[tenant] }}{% endif %}"
    additional_filter: ' depth=1'
    var_name: ip_lookup
    list_var: ip_list

- name: Debug IP lookup result
  ansible.builtin.debug:
    msg: "IP {{ ip }} lookup result: {{ ip_lookup }}"
  when: ip_list | length > 0

- name: Check if IP exists
  ansible.builtin.set_fact:
    ip_exists: "{{ ip_list | length > 0 }}"

- name: Determine if IP is correctly assigned (has the interface if provided)
  ansible.builtin.set_fact:
    ip_correctly_assigned: "{{ ip_exists and (interface_id is not defined or (ip_list[0].interfaces | default([]) | selectattr('id', 'equalto', interface_id) | list | length > 0)) }}"
  when: ip_exists

- name: Get bad assignments (interfaces other than the current)
  ansible.builtin.set_fact:
    bad_interfaces: "{{ ip_list[0].interfaces | default([]) | rejectattr('id', 'equalto', interface_id) | map(attribute='id') | list if interface_id is defined else [] }}"
  when: ip_exists and interface_id is defined

- name: Check for conflicts (has bad assignments)
  ansible.builtin.set_fact:
    has_conflict: "{{ ip_exists and bad_interfaces | default([]) | length > 0 }}"

- name: Fail if conflict and neither overwrite nor next available allowed
  ansible.builtin.fail:
    msg: "IP {{ ip }} is in use by another interface in namespace {{ nautobot_discovery_namespace }} and neither nautobot_discovery_allow_ip_overwrite nor nautobot_discovery_use_next_available_on_conflict is enabled."
  when: has_conflict and not (nautobot_discovery_allow_ip_overwrite | bool) and not (nautobot_discovery_use_next_available_on_conflict | bool)

- name: Handle conflict with next available if enabled
  block:
    - name: Allocate next available IP from parent prefix
      networktocode.nautobot.ip_address:
        url: "{{ nautobot_url }}"
        token: "{{ nautobot_token }}"
        state: new
        validate_certs: "{{ nautobot_discovery_validate_certs }}"
        namespace: "{{ nautobot_discovery_namespace }}"
      register: next_ip

    - name: Update IP to next available
      ansible.builtin.set_fact:
        ip: "{{ next_ip.ip_address.address }}"
        ip_obj: "{{ next_ip.ip_address }}"

    - name: Reparse updated IP
      ansible.builtin.include_tasks: parse_ip.yml
  when: has_conflict and nautobot_discovery_use_next_available_on_conflict | bool

- name: Resolve conflicts by unassigning bad interfaces if overwrite allowed
  networktocode.nautobot.ip_address_to_interface:
    url: "{{ nautobot_url }}"
    token: "{{ nautobot_token }}"
    ip_address: "{{ ip_list[0].id }}"
    interface: "{{ bad_int }}"
    state: absent
    validate_certs: "{{ nautobot_discovery_validate_certs }}"
  loop: "{{ bad_interfaces | default([]) }}"
  loop_control:
    loop_var: bad_int
  when: has_conflict and nautobot_discovery_allow_ip_overwrite | bool and not nautobot_discovery_use_next_available_on_conflict | bool

- name: Debug IP creation attempt
  ansible.builtin.debug:
    msg: "Attempting to create IP {{ ip }} in namespace {{ nautobot_discovery_namespace }} with tenant {{ tenant | default('None') }}."
  when: not ip_exists

- name: Create IP if not exists
  networktocode.nautobot.ip_address:
    url: "{{ nautobot_url }}"
    token: "{{ nautobot_token }}"
    address: "{{ ip }}"
    status: "{{ nautobot_discovery_status }}"
    state: present
    namespace: "{{ nautobot_discovery_namespace }}"
    tenant: "{{ nautobot_discovery_tenant_ids[tenant] if tenant is defined and tenant in nautobot_discovery_tenant_ids else omit }}"
    validate_certs: "{{ nautobot_discovery_validate_certs }}"
    query_params:
      - namespace
      - address
    type: "Host"
  register: ip_create
  when: not ip_exists
  ignore_errors: "{{ nautobot_discovery_continue_on_error | bool }}"

- name: Debug IP creation failure
  ansible.builtin.debug:
    msg: "Failed to create IP {{ ip }}: {{ ip_create.msg | default('Unknown error') }}."
  when: not ip_exists and ip_create.failed | default(false)

- name: Set IP object
  ansible.builtin.set_fact:
    ip_obj: "{{ ip_create.ip_address if ip_create.changed else ip_list[0] if ip_list | length > 0 else {} }}"

- name: Assign IP to interface if provided
  networktocode.nautobot.ip_address_to_interface:
    url: "{{ nautobot_url }}"
    token: "{{ nautobot_token }}"
    ip_address: "{{ ip_obj.id }}"
    interface: "{{ interface_id }}"
    state: present
    validate_certs: "{{ nautobot_discovery_validate_certs }}"
  when: ip_obj.id is defined and interface_id is defined and not (ip_correctly_assigned | default(false))