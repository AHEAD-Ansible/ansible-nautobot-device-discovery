---
# UNIVERSAL CHUNKED LOOKUP HELPER
# Handles batching, URL safety, retries, and merges results.

# -------------------------------------------------
# 1. VALIDATE INPUT
# -------------------------------------------------
- name: Validate required vars
  assert:
    that:
      - lookup_endpoint is defined
      - lookup_endpoint.path is defined
      - lookup_filters_input is defined and lookup_filters_input | length > 0
    fail_msg: "api_lookup_chunk: missing required vars"

# -------------------------------------------------
# 2. PREPARE EXTRA FILTERS (user‑supplied)
# -------------------------------------------------
- name: Prepare extra filters
  set_fact:
    __lookup_extra_filters_list: "{{ lookup_extra_lookup_filters | default({}) | dict2items | default([]) }}"

# -------------------------------------------------
# 3. INITIALISE QUERY PARAM LIST
# -------------------------------------------------
- name: Initialize query params
  set_fact:
    __lookup_query_params: []

# -------------------------------------------------
# 4. BUILD URL‑SAFE FILTERS
#    • Uses the `build_filter_param` filter (in nautobot_filters.py)
#    • Automatically adds `_id` for any key listed in endpoint.relationships
#    • Handles composite keys (e.g. ['location','vid'])
# -------------------------------------------------
- name: Build URL-safe query params from unique_keys and relationships
  set_fact:
    __lookup_query_params: >-
      {{
        __lookup_query_params + [
          item | build_filter_param(
            lookup_endpoint.relationships | default({}),
            lookup_endpoint.path,
            lookup_endpoint.id_filter_fields | default([])
          )
        ]
      }}
  loop: "{{ lookup_filters_input + __lookup_extra_filters_list }}"
  loop_control:
    loop_var: item
    label: "{{ item.key }} = {{ item.value }}"

# -------------------------------------------------
# 5. FINAL QUERY STRING
# -------------------------------------------------
- name: Build final query string
  set_fact:
    __lookup_query_string: "{{ __lookup_query_params | join('&') }}"

# -------------------------------------------------
# 6. SAFETY CHECK – TOO LONG?
# -------------------------------------------------
- name: Fail early if query too long
  fail:
    msg: "Query too long ({{ __lookup_query_string | length }} chars). Split into smaller chunks."
  when: __lookup_query_string | length > 1500

# -------------------------------------------------
# 7. EXECUTE THE GET REQUEST
# -------------------------------------------------
- name: Perform lookup request
  uri:
    url: "{{ nautobot_url.rstrip('/') }}/api/{{ lookup_endpoint.path.lstrip('/') }}?{{ __lookup_query_string }}"
    method: GET
    headers:
      Accept: "application/json"
      Content-Type: "application/json"
      Authorization: "Token {{ nautobot_token }}"
    return_content: true
    status_code: [200]
    validate_certs: false
  register: __lookup_exec_result
  retries: "{{ nautobot_discovery_retry_attempts | default(3) }}"
  delay: 2
  until: __lookup_exec_result.status == 200

# -------------------------------------------------
# 8. ACCUMULATE RESULTS ACROSS CHUNKS
# -------------------------------------------------
- name: Append lookup results
  set_fact:
    existing_objects: >-
      {{ existing_objects | default([]) + (__lookup_exec_result.json.results | default([])) }}