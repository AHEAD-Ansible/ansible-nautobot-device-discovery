---
# =============================================================================
# Nautobot API Upsert Task
# =============================================================================
#
# PURPOSE:
#   Perform idempotent upsert (create or update) of Nautobot objects via REST API.
#
# REQUIRED INPUT VARIABLES:
#   - endpoint_name     : Key in endpoints.yml (e.g., 'namespaces')
#   - desired_bodies    : List of dicts representing desired object state
#   - result_var        : Name of fact to store final merged results
#
# OPTIONAL INPUT VARIABLES:
#   - override_lookup_key : Force a specific lookup key (defaults to endpoint.lookup_key)
#
# DESIGN PRINCIPLES:
#   • Zero variable name collisions across includes
#   • No Jinja2 templating in set_fact keys or complex expressions
#   • All child tasks receive fully resolved, static-named inputs
#   • Safe handling of empty creates/updates via conditional skips
#   • Comprehensive cleanup to prevent fact bleed between runs
#
# =============================================================================

# -----------------------------------------------------------------------------
# 0. Global API Configuration
# -----------------------------------------------------------------------------
- name: Ensure API globals are loaded
  include_tasks: set_api_globals.yml

# -----------------------------------------------------------------------------
# 1. Load Endpoint Definitions (once per play)
# -----------------------------------------------------------------------------
- name: Load endpoint definitions from endpoints.yml
  include_vars:
    file: "{{ role_path }}/vars/endpoints.yml"
    name: all_endpoints
  when: all_endpoints is not defined

# -----------------------------------------------------------------------------
# 2. Resolve Current Endpoint Metadata
# -----------------------------------------------------------------------------
- name: Extract endpoint configuration for {{ endpoint_name }}
  set_fact:
    current_endpoint: "{{ all_endpoints.endpoints[endpoint_name] }}"

# -----------------------------------------------------------------------------
# 3. Determine Lookup Key
# -----------------------------------------------------------------------------
- name: Resolve lookup key (override → endpoint → 'name')
  set_fact:
    lookup_key: >-
      {{ override_lookup_key
         | default(current_endpoint.lookup_key | default('name')) }}

# -----------------------------------------------------------------------------
# 4. Resolve Unique Keys for Matching
# -----------------------------------------------------------------------------
- name: Determine unique key(s) for existing object lookup
  set_fact:
    upsert_unique_keys: >-
      {{ current_endpoint | resolve_unique_keys(lookup_key) }}

# =============================================================================
# 5. LOOKUP EXISTING OBJECTS
# =============================================================================
- name: Query Nautobot for existing objects matching desired state
  include_tasks: api_lookup.yml
  vars:
    lookup_endpoint: "{{ current_endpoint }}"
    lookup_desired_bodies: "{{ desired_bodies }}"
    lookup_unique_keys: "{{ upsert_unique_keys }}"
    lookup_result_var: upsert_existing
  when: desired_bodies | length > 0

# -----------------------------------------------------------------------------
# 6. Build Map of Existing Objects by Unique Key
# -----------------------------------------------------------------------------
- name: Index existing objects by unique key(s) for O(1) lookup
  set_fact:
    existing_map: >-
      {{ upsert_existing | default([]) | build_existing_map(upsert_unique_keys) }}

# -----------------------------------------------------------------------------
# 7. Classify Desired Objects: Create vs Update
# -----------------------------------------------------------------------------
- name: Diff desired vs existing → classify creates and updates
  set_fact:
    classified: >-
      {{ desired_bodies | classify_upserts(existing_map, upsert_unique_keys) | default({'creates': [], 'updates': []}) }}

# =============================================================================
# 8. BULK CREATE (POST)
# =============================================================================
- name: Chunk objects for create into payload-safe batches
  set_fact:
    create_chunks: "{{ classified.creates | smart_chunk_for_payload | default([]) }}"

- name: Execute bulk POST for new objects
  include_tasks: api_post_patch.yml
  vars:
    method: POST
    api_endpoint: "{{ current_endpoint }}"
    bodies: "{{ item }}"
    postpatch_result_var: upsert_created_chunk
  loop: "{{ create_chunks }}"
  loop_control:
    label: "POST {{ item | length }} new {{ endpoint_name }}"
  register: _create_results
  when: create_chunks | length > 0

# =============================================================================
# 9. BULK UPDATE (PATCH)
# =============================================================================
- name: Chunk objects for update into payload-safe batches
  set_fact:
    update_chunks: "{{ classified.updates | smart_chunk_for_payload | default([]) }}"

- name: Execute bulk PATCH for modified objects
  include_tasks: api_post_patch.yml
  vars:
    method: PATCH
    api_endpoint: "{{ current_endpoint }}"
    bodies: "{{ item }}"
    postpatch_result_var: upsert_updated_chunk
  loop: "{{ update_chunks }}"
  loop_control:
    label: "PATCH {{ item | length }} modified {{ endpoint_name }}"
  register: _update_results
  when: update_chunks | length > 0

# =============================================================================
# 10. MERGE RESULTS
# =============================================================================
- name: Extract created objects from loop results
  set_fact:
    upsert_created: >-
      {{ (_create_results.results
         | default([])
         | selectattr('skipped', 'undefined')
         | map(attribute='results') | flatten
         | selectattr('ansible_facts', 'defined')
         | map(attribute='ansible_facts.upsert_created_chunk') | flatten) if _create_results is defined else [] }}

- name: Extract updated objects from loop results
  set_fact:
    upsert_updated: >-
      {{ (_update_results.results
         | default([])
         | selectattr('skipped', 'undefined')
         | map(attribute='results') | flatten
         | selectattr('ansible_facts', 'defined')
         | map(attribute='ansible_facts.upsert_updated_chunk') | flatten) if _update_results is defined else [] }}

- name: Combine existing + created + updated into final result
  set_fact:
    "{{ result_var }}": >-
      {{ (upsert_existing | default([])) + upsert_created + upsert_updated }}

# =============================================================================
# 11. CLEANUP
# =============================================================================
- name: Remove temporary facts to prevent namespace pollution
  set_fact:
    current_endpoint: null
    lookup_key: null
    upsert_unique_keys: null
    upsert_existing: null
    existing_map: null
    classified: null
    create_chunks: null
    update_chunks: null
    upsert_created: null
    upsert_updated: null