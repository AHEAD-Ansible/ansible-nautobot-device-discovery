---
# UNIVERSAL BULK UPSERT (DRY Version)
# Can be invoked with just endpoint_name, desired_bodies, and result_var.

# INPUTS:
#   - endpoint_name: string (e.g., "vrfs")
#   - desired_bodies: list[dict]
#   - result_var: string
# OPTIONAL:
#   - override_lookup_key
#   - extra_lookup_filters
#   - batch_size, debug_mode

# ========================================
# 0. LOAD ENDPOINT METADATA
# ========================================
- name: Load endpoints.yml once
  include_vars:
    file: "{{ role_path }}/vars/endpoints.yml"
    name: all_endpoints
  when: all_endpoints is not defined

- name: Set endpoint definition
  set_fact:
    endpoint: "{{ all_endpoints.endpoints[endpoint_name] }}"

# ========================================
# 1. VALIDATE DESIRED_BODIES AGAINST ENDPOINT SCHEMA
# ========================================
- name: Validate required fields presence
  assert:
    that:
      - desired_bodies | length > 0
      - desired_bodies | map(attribute=field) | select('defined') | list | length == desired_bodies | length
    fail_msg: "api_upsert: Missing one or more required fields for endpoint {{ endpoint_name }}. Required: {{ endpoint.required_fields }}"
  loop: "{{ endpoint.required_fields }}"
  loop_control:
    loop_var: field
  when: desired_bodies | length > 0

# ========================================
# 2. SET DEFAULTS FROM ENDPOINT OR GLOBAL VARS
# ========================================
- name: Set lookup_key first
  set_fact:
    lookup_key: "{{ override_lookup_key | default(endpoint.lookup_key | default('name')) }}"

- name: Set remaining defaults (including unique_keys)
  set_fact:
    batch_size: "{{ batch_size | default(nautobot_discovery_bulk_chunk_size | default(50)) }}"
    debug_mode: "{{ debug_mode | default(nautobot_discovery_debug | default(false)) }}"
    unique_keys: >-
      {{
        (
          endpoint.unique_keys
          if (
            endpoint.unique_keys is defined
            and endpoint.unique_keys is not none
            and endpoint.unique_keys is not mapping
            and endpoint.unique_keys | length > 0
          )
          else endpoint.unique_together
          if (
            endpoint.unique_together is defined
            and endpoint.unique_together is not none
            and endpoint.unique_together is not mapping
            and endpoint.unique_together | length > 0
          )
          else [lookup_key]
        )
        | default([lookup_key])
      }}
    endpoint_path: "{{ endpoint.path }}"

# ========================================
# 3. BUILD LOOKUP FILTERS FROM DESIRED_BODIES
# ========================================
- name: Auto-build lookup filters from unique keys
  set_fact:
    lookup_filters_input: >-
      [
        {% for body in desired_bodies %}
          {
            "key": {{ unique_keys | to_json }},
            "value": "{% set vals = [] %}{% for k in unique_keys %}{% set v = body[k] %}{% if k in endpoint.relationships and v is mapping %}{{ vals.append(v.id | string) }}{% else %}{{ vals.append(v | string) }}{% endif %}{% endfor %}{{ vals | join(':') }}"
          }{% if not loop.last %},{% endif %}
        {% endfor %}
      ]

- name: Validate lookup filters now exist if needed
  assert:
    that:
      - lookup_filters_input is defined and lookup_filters_input is iterable and lookup_filters_input | length > 0 or desired_bodies | length == 0
    fail_msg: "api_upsert: lookup_filters_input required if desired_bodies non-empty"
  when: desired_bodies | length > 0

# ========================================
# 4. CHUNKED LOOKUP OF EXISTING OBJECTS
# ========================================
- name: Initialize existing_objects
  set_fact:
    existing_objects: []

- name: Build chunked lookup filters
  set_fact:
    __lookup_chunks: "{{ lookup_filters_input | batch(batch_size) | list }}"

- name: Lookup existing objects (chunked)
  include_tasks: api_lookup_chunk.yml
  loop: "{{ __lookup_chunks }}"
  loop_control:
    loop_var: __lookup_chunk
  vars:
    lookup_endpoint: "{{ endpoint }}"
    lookup_filters_input: "{{ __lookup_chunk }}"
    lookup_extra_lookup_filters: "{{ extra_lookup_filters | default({}) }}"
  when: lookup_filters_input | length > 0

# (No merge needed—appending happens in api_lookup_chunk.yml)

# ========================================
# 5. BUILD EXISTING MAP
# ========================================
- name: Build existing_map keyed by unique_keys
  set_fact:
    existing_map: "{{ existing_objects | build_existing_map(unique_keys) }}"

# ========================================
# 6. CLASSIFY CREATES AND UPDATES
# ========================================
- name: Classify creates and updates
  set_fact:
    results: "{{ desired_bodies | classify_upserts(existing_map, unique_keys) }}"

- name: Extract create and update bodies
  set_fact:
    create_bodies: "{{ results.creates }}"
    update_bodies: "{{ results.updates }}"

# ========================================
# 7. BULK CREATE / UPDATE
# ========================================
- name: Bulk create (chunked)
  include_tasks: api_bulk.yml
  loop: "{{ create_bodies | batch(batch_size) | list }}"
  loop_control:
    loop_var: chunk
  vars:
    method: POST
    api_endpoint: "{{ endpoint }}"
    bodies: "{{ chunk }}"
    result_var: created_chunk
  when: create_bodies | length > 0
  register: create_results

- name: Bulk patch (chunked)
  include_tasks: api_bulk.yml
  loop: "{{ update_bodies | batch(batch_size) | list }}"
  loop_control:
    loop_var: chunk
  vars:
    method: PATCH
    api_endpoint: "{{ endpoint }}"
    bodies: "{{ chunk }}"
    result_var: updated_chunk
  when: update_bodies | length > 0
  register: update_results

# ========================================
# 8. FINAL OUTPUT
# ========================================
- name: Build final unified result
  set_fact:
    "{{ result_var }}": >-
      {{
        existing_objects
        | merge_upsert_results(
            create_results.results | default([]),
            update_results.results | default([])
          )
      }}

# ========================================
# 9. CLEANUP (prevent cross-contamination between upserts)
# ========================================
- name: Cleanup temporary upsert facts
  set_fact:
    endpoint: null
    endpoint_path: null
    lookup_filters_input: null
    __lookup_chunks: null
    existing_objects: null
    existing_map: null
    results: null
    create_bodies: null
    update_bodies: null
    create_results: null
    update_results: null