# roles/nautobot_discovery/tasks/api_upsert.yml
---
# === UNIVERSAL UPSERT: Supports dotted unique_key (e.g. prefix.id) ===
# REQUIRED:
#   - endpoint
#   - desired_bodies: list[dict]
#   - unique_key: str (e.g. "rd", "prefix.id")
#   - lookup_filters_input: list[dict] → [{'key': 'rd', 'value': '0'}, ...]
#   - result_var: str
# OPTIONAL:
#   - batch_size (default: 50)
#   - extra_lookup_filters: dict
#   - debug_mode (via nautobot_discovery_debug)

- name: Validate required vars
  assert:
    that:
      - endpoint is defined
      - endpoint.path is defined
      - desired_bodies is defined
      - unique_key is defined
      - lookup_filters_input is defined and lookup_filters_input is iterable and lookup_filters_input | length > 0
      - result_var is defined
    fail_msg: "api_upsert: missing required vars"

- name: Set defaults
  set_fact:
    batch_size: "{{ nautobot_discovery_batch_size | default(50) }}"
    debug_mode: "{{ nautobot_discovery_debug | default(false) }}"
    is_dotted: "{{ '.' in unique_key }}"

# ========================================
# 1. LOOKUP EXISTING (chunked)
# ========================================
- name: Prepare extra filters
  set_fact:
    extra_filters_list: "{{ extra_lookup_filters | default({}) | dict2items }}"
  when: extra_lookup_filters is defined

- name: Chunk lookup filters
  set_fact:
    lookup_chunks: "{{ lookup_filters_input | batch(batch_size) | list }}"

- name: Initialize existing objects
  set_fact:
    existing_objects: []

- name: Lookup existing objects (chunked)
  include_tasks: api_lookup_chunk.yml
  loop: "{{ lookup_chunks }}"
  loop_control:
    loop_var: chunk
  when: lookup_chunks | length > 0

- name: Flatten results
  set_fact:
    existing_objects: "{{ existing_objects | flatten }}"

# ========================================
# 2. BUILD existing_map: unique_value → object
# ========================================
- name: Extract unique value safely (existing_objects)
  set_fact:
    _extracted: "{{ (item | json_query(unique_key)) if is_dotted else (item[unique_key] | default(none)) }}"
  loop: "{{ existing_objects }}"
  register: _extracted_keys

- name: Build existing_map
  set_fact:
    existing_map: "{{ existing_map | default({}) | combine({ extracted_key: item }, recursive=False) }}"
  loop: "{{ existing_objects | zip(range(0, existing_objects | length)) | list }}"
  loop_control:
    loop_var: pair
    label: "{{ pair.0.name | default('unknown') }}"
  vars:
    item: "{{ pair.0 }}"
    idx: "{{ pair.1 }}"
    extracted_key: "{{ _extracted_keys.results[idx].ansible_facts._extracted | default(None) }}"
  when: extracted_key is not none



# ========================================
# 3. CLASSIFY: CREATE vs UPDATE
# ========================================
- name: Initialize create_bodies
  set_fact:
    create_bodies: []

- name: Extract desired unique values
  set_fact:
    _desired_key: "{{ (item | json_query(unique_key)) if is_dotted else (item[unique_key] | default(none)) }}"
  loop: "{{ desired_bodies }}"
  register: _desired_keys

- name: Identify objects to create
  set_fact:
    create_bodies: "{{ create_bodies + [item.item] }}"
  loop: "{{ _desired_keys.results }}"
  loop_control:
    label: "{{ item.ansible_facts._desired_key | default('undefined') }}"
  when: >
    item.ansible_facts._desired_key is not none and
    (item.ansible_facts._desired_key | string | trim) not in (existing_map | default({}))


# ========================================
# 4. IDENTIFY UPDATES
# ========================================
- name: Evaluate updates
  set_fact:
    _candidate: >-
      {% set key_val = ((item | json_query(unique_key)) if is_dotted else (item[unique_key] | default(none))) %}
      {% set key_str = (key_val | string | trim) if key_val is not none else none %}
      {% set existing = (existing_map[key_str]) if key_str is not none and (existing_map is defined and key_str in existing_map) else none %}
      {% if existing is none %}
      {{ none }}
      {% else %}
      {% set readonly = ['id','url','created','last_updated','display','natural_slug','notes_url','_occupied','_nested','_depth','object_type','custom_fields'] %}
      {% set desired_clean = item | dict_exclude(readonly) %}
      {% set existing_clean = existing | dict_exclude(readonly) %}
      {% if desired_clean != existing_clean %}
      {{ desired_clean | combine({'id': existing.id}) }}
      {% else %}
      {{ none }}
      {% endif %}
      {% endif %}
  loop: "{{ desired_bodies }}"
  loop_control:
    loop_var: item
  register: _update_candidates

- name: Initialize update_bodies
  set_fact:
    update_bodies: []

- name: Collect valid update bodies
  set_fact:
    update_bodies: "{{ (update_bodies | default([])) + [_item.ansible_facts._candidate] }}"
  loop: "{{ _update_candidates.results }}"
  loop_control:
    loop_var: _item
  when: >
    _item.ansible_facts._candidate is defined and
    _item.ansible_facts._candidate is not none and
    (_item.ansible_facts._candidate | type_debug) == 'dict' and
    (_item.ansible_facts._candidate | length > 0)

# ========================================
# 4.5 FINAL SANITIZATION (after classification)
# ========================================
- name: Sanitize create and update bodies before API calls
  set_fact:
    create_bodies: >-
      {{ (create_bodies | default([])) | map('dict2items')
        | map('rejectattr', 'key', 'in', [
            'id','url','object_type','notes_url','natural_slug',
            'display','created','last_updated'
          ])
        | map('items2dict') | list }}
    update_bodies: >-
      {{ (update_bodies | default([])) | map('dict2items')
        | map('rejectattr', 'key', 'in', [
            'id','url','object_type','notes_url','natural_slug',
            'display','created','last_updated'
          ])
        | map('items2dict') | list }}

# ========================================
# 5. BULK CREATE
# ========================================
- name: Bulk create (chunked)
  include_tasks: api_bulk.yml
  loop: "{{ create_bodies | batch(batch_size) | list }}"
  loop_control:
    loop_var: chunk
  vars:
    method: POST
    api_endpoint: "{{ endpoint }}"
    bodies: "{{ chunk }}"
    result_var: created_chunk
  when: create_bodies | length > 0
  register: create_results


# ========================================
# 6. BULK PATCH
# ========================================
- name: Bulk patch (chunked)
  include_tasks: api_bulk.yml
  loop: "{{ update_bodies | batch(batch_size) | list }}"
  loop_control:
    loop_var: chunk
  vars:
    method: PATCH
    api_endpoint: "{{ endpoint }}"
    bodies: "{{ chunk }}"
    result_var: updated_chunk
  when: update_bodies | length > 0
  register: update_results

- name: Flatten updated
  set_fact:
    updated_objects: >-
      {{ (update_results.results | default([]) | map(attribute='updated_chunk') | flatten | default([])) }}

# ========================================
# 7. COLLECT UNCHANGED (existing but no update needed)
# ========================================
- name: Collect unchanged existing objects
  set_fact:
    unchanged_objects: >
      {{
        existing_objects
        | rejectattr('id', 'in',
            (created_objects | default([])) + (updated_objects | default([]))
            | map(attribute='id')
        )
        | list
      }}

# ========================================
# 8. RETURN RESULT: created + updated + unchanged
# ========================================
- name: Combine created + updated + unchanged
  set_fact:
    "{{ result_var }}": >
      {{
        (created_objects | default([])) +
        (updated_objects | default([])) +
        (unchanged_objects | default([]))
      }}

- name: Clear extra_lookup_filters and list
  set_fact:
    extra_lookup_filters: {}
    extra_filters_list: {}