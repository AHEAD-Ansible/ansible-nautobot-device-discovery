---
- include_tasks: api_lookup.yml
  vars:
    endpoint: "{{ endpoints.interfaces }}"
    filters:
      device: "{{ device_id }}"
      name: "{{ intf.name }}"
    var_name: interface_list

- name: Set existing interface
  set_fact:
    interface: "{{ interface_list[0] if interface_list | length > 0 else {} }}"

- name: Create or update interface
  include_tasks: api_create_or_update.yml
  vars:
    endpoint: "{{ endpoints.interfaces }}"
    obj_id: "{{ interface.id if interface.id is defined }}"
    body:
      device:
        id: "{{ device_id }}"
      name: "{{ intf.name }}"
      type: "{{ intf.type }}"
      enabled: true
      status: "{{ nautobot_status }}"
      mode: "{{ 'access' if intf.vlan is defined and intf.vlan in vlan_ids else 'tagged' if intf.tagged_vlans is defined and intf.tagged_vlans | length > 0 else omit }}"
      untagged_vlan:
        id: "{{ vlan_ids[intf.vlan] if intf.vlan is defined and intf.vlan in vlan_ids else omit }}"
      vrf:
        id: "{{ vrf_ids[intf.vrf] if intf.vrf is defined and intf.vrf in vrf_ids else omit }}"
    var_name: interface
  when: interface_list | length == 0 or interface.id is defined

- set_fact:
    interface_id: "{{ interface.id }}"

- name: Process IP addresses
  include_tasks: process_ip.yml
  loop: "{{ intf.ip_addresses }}"
  loop_control:
    loop_var: ip
  vars:
    vrf: "{{ intf.vrf | default(omit) }}"
    tenant: "{{ device.tenant | default(omit) }}"