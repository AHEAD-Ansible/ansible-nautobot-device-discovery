---
- name: Ensure interface exists
  networktocode.nautobot.device_interface:
    url: "{{ nautobot_url }}"
    token: "{{ nautobot_token }}"
    device: "{{ device_id }}"
    name: "{{ intf.name }}"
    type: "{{ intf.type }}"
    enabled: true
    status: "{{ nautobot_status }}"
    mode: >-
      {%- if intf.vlan is defined and intf.vlan in vlan_ids -%}access{%- elif intf.tagged_vlans is defined and intf.tagged_vlans | length > 0 -%}tagged{%- else -%}{{ omit }}{%- endif -%}
    untagged_vlan: "{{ vlan_ids[intf.vlan] if intf.vlan is defined and intf.vlan in vlan_ids else omit }}"
    vrf: "{{ vrf_ids[intf.vrf] if intf.vrf is defined and intf.vrf in vrf_ids else omit }}"
    state: present
    validate_certs: "{{ nautobot_validate_certs }}"
    query_params:
      - device
      - name
  register: intf_result

- name: Process each IP address
  ansible.builtin.include_tasks: process_ip.yml
  loop: "{{ intf.ip_addresses }}"
  loop_control:
    loop_var: ip
  vars:
    interface_id: "{{ intf_result.interface.id }}"
    vrf: "{{ intf.vrf | default(omit) }}"
    tenant: "{{ device.tenant | default(omit) }}"