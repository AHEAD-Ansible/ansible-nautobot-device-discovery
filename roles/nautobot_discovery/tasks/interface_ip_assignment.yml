---
# Reusable task to process an IP address for Nautobot, ensuring it exists and is not in use by another device/interface.
# Variables required:
# - ip: The IP address with prefix (e.g., '10.0.0.1/24')
# - nautobot_url: Nautobot API URL
# - nautobot_token: Nautobot API token
# - namespace: Namespace for IP lookup (default in defaults/main.yml)
# Optional variables:
# - device_id: Device ID for conflict checking
# - interface_id: Interface ID for conflict checking
# - intf_result: Interface result for assignment (with 'interface.id')
# - device: Device details for assignment (with 'model', 'name')
# - intf: Interface details for assignment (with 'name')
# Outputs:
# - ip_obj: The IP address object (with 'id', 'address', etc.)

- name: Compute IP host and mask
  command: python -c "import ipaddress; interface = ipaddress.ip_interface('{{ ip }}'); print(str(interface.ip)); print(str(interface.network.prefixlen)); print(str(interface.network))"
  register: ip_compute
  changed_when: false

- name: Set IP facts
  set_fact:
    ip_host: "{{ ip_compute.stdout_lines[0] }}"
    ip_mask: "{{ ip_compute.stdout_lines[1] }}"
    ip_prefix: "{{ ip_compute.stdout_lines[2] }}"

- name: Lookup IP address by exact address
  ansible.builtin.set_fact:
    ip_lookup: "{{ lookup('networktocode.nautobot.lookup', 'ip-addresses', api_filter='address=' ~ ip ~ ' namespace=' ~ namespace, api_endpoint=nautobot_url, token=nautobot_token, raw_data=True, num_retries=3) | default({}) }}"

- name: Debug IP lookup
  ansible.builtin.debug:
    msg: "IP lookup result for {{ ip }}: {{ ip_lookup }}"
  when: ip_lookup | length > 0

- name: Normalize IP lookup
  ansible.builtin.set_fact:
    ip_list: "{{ [ip_lookup] if ip_lookup is mapping else ip_lookup if ip_lookup is iterable and not (ip_lookup is string) else [] }}"

- name: Check for IP conflict (assigned to different device or interface)
  ansible.builtin.set_fact:
    ip_conflict: "{{ ip_list | length > 0 and (device_id is not defined or ip_list[0].interfaces | default([]) | selectattr('device', 'ne', device_id) | list | length > 0 or ip_list[0].interfaces | default([]) | selectattr('id', 'ne', interface_id) | list | length > 0) }}"
  when: ip_list | length > 0 and (device_id is defined or interface_id is defined)

- name: Debug IP conflict status
  ansible.builtin.debug:
    msg: "IP {{ ip }} conflict: {{ ip_conflict | default(false) }} (exists but assigned to different device or interface)"
  when: ip_conflict | default(false)

- name: Fail on conflict if overwrite not allowed
  ansible.builtin.fail:
    msg: "IP {{ ip }} is in use by another device/interface in namespace {{ namespace }} and allow_ip_overwrite is false"
  when: ip_conflict | default(false) and not allow_ip_overwrite | bool

- name: Handle conflict if overwrite allowed
  block:
    - name: Delete conflicting IP
      networktocode.nautobot.ip_address:
        url: "{{ nautobot_url }}"
        token: "{{ nautobot_token }}"
        address: "{{ ip_list[0].address }}"
        state: absent
        validate_certs: false
      when: ip_list | length > 0
  when: ip_conflict | default(false) and allow_ip_overwrite | bool

- name: Lookup parent prefix for IP
  ansible.builtin.set_fact:
    parent_prefix: "{{ lookup('networktocode.nautobot.lookup', 'prefixes', api_filter='prefix=' ~ ip_prefix ~ ' namespace=' ~ namespace, api_endpoint=nautobot_url, token=nautobot_token, raw_data=True, num_retries=3) | default({}) }}"
  when: ip_list | length == 0 or ip_conflict | default(false)

- name: Debug parent prefix
  ansible.builtin.debug:
    msg: "Parent prefix for {{ ip_prefix }}: {{ parent_prefix }}"
  when: ip_list | length == 0 or ip_conflict | default(false)

- name: Create parent prefix if not exists
  networktocode.nautobot.prefix:
    url: "{{ nautobot_url }}"
    token: "{{ nautobot_token }}"
    prefix: "{{ ip_prefix }}"
    namespace: "{{ namespace }}"
    status: "Active"
    state: present
    validate_certs: false
    query_params:
      - prefix
      - namespace
  register: prefix_create
  when: ip_list | length == 0 or ip_conflict | default(false) and parent_prefix | length == 0

- name: Set parent prefix ID
  ansible.builtin.set_fact:
    parent_prefix_id: "{{ prefix_create.prefix.id if prefix_create.changed else parent_prefix.id if parent_prefix | length > 0 else omit }}"

- name: Get next available IP from parent prefix on conflict if enabled
  block:
    - name: Allocate next available IP
      networktocode.nautobot.ip_address:
        url: "{{ nautobot_url }}"
        token: "{{ nautobot_token }}"
        parent: "{{ parent_prefix_id if parent_prefix_id is defined else ip_prefix }}"
        state: new
        validate_certs: false
      register: next_ip
      when: parent_prefix_id is defined or parent_prefix | length > 0
    - name: Set IP to next available
      set_fact:
        ip: "{{ next_ip.ip_address.address }}"
        ip_host: "{{ next_ip.ip_address.host }}"
        ip_mask: "{{ next_ip.ip_address.mask_length }}"
  when: ip_conflict | default(false) and use_next_available_on_conflict | bool

- name: Create IP if not found or was conflicting
  networktocode.nautobot.ip_address:
    url: "{{ nautobot_url }}"
    token: "{{ nautobot_token }}"
    address: "{{ ip }}"
    parent: "{{ parent_prefix_id if parent_prefix_id is defined else ip_prefix }}"
    status: Active
    state: present
    namespace: "{{ namespace }}"
    validate_certs: false
    query_params:
      - namespace
      - address
  register: ip_create
  when: ip_list | length == 0 or ip_conflict | default(false)

- name: Set IP obj
  ansible.builtin.set_fact:
    ip_obj: "{{ ip_create.ip_address if ip_create.changed else ip_list[0] if ip_list | length > 0 else {} }}"
  when: ip_obj is not defined or ip_create.changed

- name: Assign IP to interface if needed
  ansible.builtin.include_tasks: interface_ip_assignment.yml
  when: ip_obj | length > 0 and intf_result is defined and device is defined and intf is defined