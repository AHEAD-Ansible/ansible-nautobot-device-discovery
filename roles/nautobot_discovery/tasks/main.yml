---
- name: Validate required variables
  fail:
    msg: "Missing required variable {{ item }}"
  when: lookup('vars', item, default='UNDEFINED') == 'UNDEFINED'
  loop:
    - nautobot_url
    - nautobot_token
    - device_facts

- name: Process each device
  include_tasks: process_device.yml
  loop: "{{ device_facts }}"
  loop_control:
    loop_var: device
  ignore_errors: "{{ continue_on_error | bool }}"