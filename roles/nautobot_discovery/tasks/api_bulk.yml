---
# Handles ONLY bulk POST and PATCH. Use api_lookup.yml for GETs.
- name: "Perform API bulk operation on {{ api_endpoint.path }}"
  block:

    - name: "Execute bulk POST or PATCH"
      ansible.builtin.uri:
        url: "{{ api_base_url }}{{ api_endpoint.path }}"
        method: "{{ method }}"
        headers: "{{ api_headers }}"
        body: "{{ bodies | to_json }}"
        body_format: json
        validate_certs: "{{ nautobot_validate_certs | default(false) }}"
        return_content: yes
        status_code: "{{ 201 if method == 'POST' else 200 }}"
      register: api_result
      ignore_errors: "{{ continue_on_error | default(false) }}"
      retries: "{{ nautobot_discovery_retry_attempts | default(3) }}"
      delay: 5
      when:
        - method in ['POST', 'PATCH']
        - bodies is defined
        - bodies | length > 0
      failed_when: >
        api_result is not defined or
        api_result.get('status', 0) not in [200, 201, 204]

    - name: "Set result for POST/PATCH"
      set_fact:
        "{{ result_var }}": >-
          {{
            api_result.json
            if (api_result.json is iterable and api_result.json is not string)
            else [api_result.json]
            if api_result.json is defined
            else []
          }}
      when:
        - method in ['POST', 'PATCH']
        - api_result is defined
        - api_result.get('status', 0) in [200, 201, 204]

