---
- name: Include lookup and normalize tasks
  include_tasks: lookup_and_normalize.yml
  vars:
    endpoint: 'prefixes'
    filter_query: 'prefix={{ ip_prefix }} namespace={{ nautobot_discovery_namespace }}{% if prefix_vrf is defined and prefix_vrf in nautobot_discovery_vrf_ids %} vrfs={{ nautobot_discovery_vrf_ids[prefix_vrf] }}{% endif %}'
    var_name: exact_prefix
    list_var: exact_list

- name: Create prefix if not exists
  networktocode.nautobot.prefix:
    url: "{{ nautobot_url }}"
    token: "{{ nautobot_token }}"
    prefix: "{{ ip_prefix }}"
    namespace: "{{ nautobot_discovery_namespace }}"
    vrf: "{{ nautobot_discovery_vrf_ids[prefix_vrf] if prefix_vrf is defined and prefix_vrf in nautobot_discovery_vrf_ids else omit }}"  # Add VRF to prefix
    status: "{{ nautobot_discovery_status }}"
    state: present
    validate_certs: "{{ nautobot_discovery_validate_certs }}"
    query_params:
      - prefix
      - namespace
      - vrf  # Valid for prefix list queries
  register: prefix_create
  when: exact_list | length == 0

- name: Set parent prefix ID
  ansible.builtin.set_fact:
    parent_prefix_id: "{{ prefix_create.prefix.id if prefix_create.changed else exact_list[0].id if exact_list | length > 0 else omit }}"

- name: Store prefix ID in dict
  ansible.builtin.set_fact:
    nautobot_discovery_prefix_ids: "{{ nautobot_discovery_prefix_ids | combine({(prefix_vrf|default('')) ~ ':' ~ ip_prefix: parent_prefix_id}) if prefix_vrf is defined else nautobot_discovery_prefix_ids | combine({ip_prefix: parent_prefix_id}) }}"
  when: parent_prefix_id is not none and parent_prefix_id != omit