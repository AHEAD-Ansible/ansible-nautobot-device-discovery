---
- name: Debug input variables
  debug:
    msg: "Processing platform: name={{ device.platform | default('Unknown') }}, manufacturer_id={{ manufacturer_id }}, endpoint={{ endpoints.platforms }}"
  when: debug | default(false)

- include_tasks: api_lookup.yml
  vars:
    endpoint: "{{ endpoints.platforms }}"
    filters:
      name: "{{ device.platform | default('Unknown') }}"
      manufacturer: "{{ manufacturer_id }}"
    var_name: platform_list

- name: Set existing platform
  set_fact:
    platform: "{{ platform_list[0] if platform_list | length > 0 else {} }}"

- name: Debug platform lookup result
  debug:
    msg: "Platform lookup result: {{ platform }}"
  when: debug | default(false)

- name: Create or update platform
  include_tasks: api_create_or_update.yml
  vars:
    endpoint: "{{ endpoints.platforms }}"
    obj_id: "{{ platform.id if platform.id is defined }}"
    body:
      name: "{{ device.platform | default('Unknown') }}"
      manufacturer:
        id: "{{ manufacturer_id }}"
      slug: "{{ (device.platform | default('Unknown') | lower | replace(' ', '-')) }}"
    var_name: platform
  when: (platform_list | length == 0 or platform.id is defined) and manufacturer_id is defined

- name: Handle existing platform on 400 error
  block:
    - name: Lookup platform by name and manufacturer after 400 error
      ansible.builtin.uri:
        url: "{{ api_base_url }}{{ endpoints.platforms.path }}?name={{ device.platform | default('Unknown') | urlencode }}&manufacturer={{ manufacturer_id | urlencode }}"
        headers: "{{ api_headers }}"
        method: GET
        validate_certs: "{{ nautobot_validate_certs }}"
        return_content: yes
        status_code: 200
      register: retry_result
      when: api_result.status == 400 and api_result.json is defined and 'name' in api_result.json and 'already exists' in api_result.json.name[0]

    - name: Set platform from retry result
      set_fact:
        platform: "{{ retry_result.json.results[0] if retry_result.json.results | length > 0 else {} }}"
      when: retry_result.status == 200
  when: api_result.status == 400 and api_result.json is defined and 'name' in api_result.json and 'already exists' in api_result.json.name[0]

- name: Debug platform after retry
  debug:
    msg: "Platform after retry: {{ platform }}"
  when: debug | default(false)

- name: Set platform ID
  set_fact:
    platform_id: "{{ platform.id | default(omit) }}"
  when: platform.id is defined