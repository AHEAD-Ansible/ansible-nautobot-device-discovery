---
- name: Load endpoints
  include_vars:
    file: vars/endpoints.yml

- include_tasks: process_manufacturer.yml
- include_tasks: process_platform.yml
- include_tasks: process_role.yml
- include_tasks: process_device_type.yml
- include_tasks: process_tenant.yml
  when: device.tenant is defined
- include_tasks: process_software_version.yml
  when: device.software_version is defined
- include_tasks: process_location.yml
  when: device.location is defined
- include_tasks: process_rack.yml
  when: device.rack is defined

- name: Reset tag_ids for this device
  set_fact:
    tag_ids: []
  when: device.tags | length > 0

- include_tasks: process_tag.yml
  loop: "{{ device.tags | default([]) | unique }}"
  loop_control:
    loop_var: tag_name
  when: device.tags | length > 0

- name: Lookup existing device
  include_tasks: api_lookup.yml
  vars:
    endpoint: "{{ endpoints.devices }}"
    filters:
      serial: "{{ device.serial_number }}"
      name: "{{ device.name }}"
    var_name: device_list

- name: Set existing device
  set_fact:
    device_obj: "{{ device_list[0] if device_list | length > 0 else {} }}"

- name: Set tags list
  set_fact:
    tags_list: "{{ tag_ids | default([]) | map('regex_replace', '^(.*)$', '{\"id\": \"\\1\"}') | map('from_json') | list }}"

- name: Create or update device
  include_tasks: api_create_or_update.yml
  vars:
    endpoint: "{{ endpoints.devices }}"
    obj_id: "{{ device_obj.id | default(omit) }}"
    body:
      name: "{{ device.name }}"
      serial: "{{ device.serial_number }}"
      device_type: { "id": "{{ device_type.id }}" }
      role: { "id": "{{ role.id }}" }
      platform: { "id": "{{ platform.id }}" }
      location: { "id": "{{ location.id | default(omit) }}" }
      status: "{{ device.status | default(nautobot_status) }}"
      custom_fields: "{{ device.custom_fields | default({}) }}"
      tags: "{{ tags_list }}"
      asset_tag: "{{ device.asset_tag | default(omit) }}"
      rack: { "id": "{{ rack.id | default(omit) }}" }
      position: "{{ device.position | default(omit) }}"
      face: "{{ device.face | default(omit) }}"
      tenant: { "id": "{{ tenant.id | default(omit) }}" }
      software_version: { "id": "{{ software_version.id | default(omit) }}" }
      comments: "{{ device.comments | default('') }}"
    var_name: device_obj

- name: Set device_id
  set_fact:
    device_id: "{{ device_obj.id }}"


- name: Collect unique VRFs
  set_fact:
    unique_vrfs: "{{ (device.interfaces | default([]) | map(attribute='vrf') | select('defined') | unique + device.vrfs | default([])) | unique | select('defined') | list }}"

- include_tasks: process_vrf.yml
  loop: "{{ unique_vrfs }}"
  loop_control:
    loop_var: vrf_name
  when: unique_vrfs | length > 0 and device_id is defined

- include_tasks: process_vlan.yml
  loop: "{{ device.vlans | default([]) | unique }}"
  loop_control:
    loop_var: vlan_name
    label: "{{ vlan_name }}"
  when: device.vlans | length > 0 and device_id is defined

- include_tasks: process_interface.yml
  loop: "{{ device.interfaces | default([]) }}"
  loop_control:
    loop_var: intf
  when: device.interfaces | length > 0 and device_id is defined

- name: Process primary IP
  include_tasks: process_ip.yml
  vars:
    ip: "{{ device.primary_ip4 }}"
    interface_name: "mgmt"
    interface_id: "{{ (device.interfaces | selectattr('name', 'equalto', 'mgmt') | first).id | default(omit) if device.primary_ip4 in (device.interfaces | selectattr('name', 'equalto', 'mgmt') | first).ip_addresses | default([]) else omit }}"
    vrf_name: "{{ (device.interfaces | selectattr('name', 'equalto', 'mgmt') | first).vrf | default(omit) }}"
    tenant: "{{ device.tenant | default(omit) }}"
  when: device.primary_ip4 is defined and device_id is defined

- name: Update device with primary IP
  include_tasks: api_create_or_update.yml
  vars:
    endpoint: "{{ endpoints.devices }}"
    obj_id: "{{ device_id }}"
    body:
      primary_ip4: { "id": "{{ ip_obj.id | default(omit) }}" }
    var_name: device_obj
  when: device.primary_ip4 is defined and ip_obj.id is defined and device_id is defined