# roles/nautobot_discovery/tasks/process_device.yml
---
- name: Load endpoints
  include_vars:
    file: vars/endpoints.yml

- include_tasks: process_manufacturer.yml
- include_tasks: process_platform.yml
- include_tasks: process_role.yml
- include_tasks: process_device_type.yml
- include_tasks: process_tenant.yml
  when: device.tenant is defined
- include_tasks: process_software_version.yml
  when: device.software_version is defined
- include_tasks: process_location.yml
  when: device.location is defined
- include_tasks: process_rack.yml
  when: device.rack is defined

- name: Reset tag_ids for this device
  set_fact:
    tag_ids: []
  when: device.tags | length > 0

- include_tasks: process_tag.yml
  loop: "{{ device.tags | default([]) | unique }}"
  loop_control:
    loop_var: tag_name
  when: device.tags | length > 0

- name: Lookup existing device
  include_tasks: api_lookup.yml
  vars:
    endpoint: "{{ endpoints.devices }}"
    filters:
      serial: "{{ device.serial_number }}"
      name: "{{ device.name }}"
    var_name: device_list

- name: Set existing device
  set_fact:
    device_obj: "{{ device_list[0] if device_list | length > 0 else {} }}"

- name: Set tags list
  set_fact:
    tags_list: >-
      {{ tag_ids | default([]) |
         map('regex_replace', '^(.*)$', '{"id": "\1"}') |
         map('from_json') | list }}

- name: Create or update device
  include_tasks: api_create_or_update.yml
  vars:
    endpoint: "{{ endpoints.devices }}"
    obj_id: "{{ device_obj.id | default(omit) }}"
    body:
      name: "{{ device.name }}"
      serial: "{{ device.serial_number }}"
      device_type: { "id": "{{ device_type.id }}" }
      role: { "id": "{{ role.id }}" }
      platform: { "id": "{{ platform.id }}" }
      location: { "id": "{{ location.id | default(omit) }}" }
      status: "{{ device.status | default(nautobot_status) }}"
      custom_fields: "{{ device.custom_fields | default({}) }}"
      tags: "{{ tags_list }}"
      asset_tag: "{{ device.asset_tag | default(omit) }}"
      rack: { "id": "{{ rack.id | default(omit) }}" }
      position: "{{ device.position | default(omit) }}"
      face: "{{ device.face | default(omit) }}"
      tenant: { "id": "{{ tenant.id | default(omit) }}" }
      software_version: { "id": "{{ software_version.id | default(omit) }}" }
      comments: "{{ device.comments | default('') }}"
    var_name: device_obj

- name: Set device_id
  set_fact:
    device_id: "{{ device_obj.id }}"

# ------------------------------------------------------------------
# Namespace handling (renamed to avoid reserved name)
# ------------------------------------------------------------------
- name: Lookup or create namespace
  block:
    - include_tasks: api_lookup.yml
      vars:
        endpoint: "{{ endpoints.namespaces }}"
        filters:
          name: "{{ nautobot_namespace }}"
        var_name: namespace_list

    - name: Set namespace object
      set_fact:
        namespace_obj: "{{ namespace_list[0] if namespace_list | length > 0 else {} }}"

    - include_tasks: api_create_or_update.yml
      vars:
        endpoint: "{{ endpoints.namespaces }}"
        obj_id: omit
        body:
          name: "{{ nautobot_namespace }}"
          description: ""
        var_name: namespace_obj
      when: namespace_list | length == 0

# ------------------------------------------------------------------
# VRFs – bulk upsert
# ------------------------------------------------------------------
- name: Collect unique VRFs
  set_fact:
    unique_vrfs: >-
      {{ (device.interfaces | default([]) |
          map(attribute='vrf') | select('defined') | unique +
          device.vrfs | default([])) |
         unique | select('defined') | list }}

- name: Initialize desired VRF list
  set_fact:
    desired_vrfs: []
  when: unique_vrfs | length > 0

- name: Build desired VRF bodies
  set_fact:
    desired_vrfs: >-
      {{ desired_vrfs + [{
          'name': item,
          'rd': item,
          'namespace': {'id': namespace_obj.id}
      }] }}
  loop: "{{ unique_vrfs }}"
  when: unique_vrfs | length > 0

# ------------------------------------------------------------------
# NEW: Build VRF lookup filters for bulk query (?rd=0&rd=1)
# ------------------------------------------------------------------
- name: Build VRF lookup filters
  include_tasks: utils_build_lookup_filters.yml
  vars:
    endpoint: "{{ endpoints.vrfs }}"
    values: "{{ unique_vrfs }}"
    result_var: vrf_lookup_filters

# ------------------------------------------------------------------
# Bulk upsert VRFs (using list-of-dicts filters)
# ------------------------------------------------------------------
- name: Upsert VRFs in bulk
  include_tasks: api_upsert.yml
  vars:
    endpoint: "{{ endpoints.vrfs }}"
    desired_bodies: "{{ desired_vrfs }}"
    unique_key: "{{ endpoints.vrfs.lookup_key }}"
    lookup_filters_input: "{{ vrf_lookup_filters }}"
    result_var: final_vrfs
    extra_lookup_filters:
      namespace: "{{ namespace_obj.id }}"
  when: unique_vrfs | length > 0

- name: Build vrf_ids map
  set_fact:
    vrf_ids: "{{ dict(unique_vrfs | zip(final_vrfs | map(attribute='id'))) }}"
  when: unique_vrfs | length > 0

# ------------------------------------------------------------------
# VLANs – bulk upsert
# ------------------------------------------------------------------
- name: Collect unique VLANs
  set_fact:
    unique_vlans: >-
      {{ (device.vlans | default([]) +
          device.interfaces | default([]) |
          map(attribute='vlan') | select('defined')) |
         unique | list }}

- name: Initialize desired VLAN list
  set_fact:
    desired_vlans: []
  when: unique_vlans | length > 0

- name: Build desired VLAN bodies
  set_fact:
    desired_vlans: >-
      {{ desired_vlans + [{'name': item,
                          'vid': 1,
                          'location': {'id': location.id},
                          'status': nautobot_status}] }}
  loop: "{{ unique_vlans }}"
  when: unique_vlans | length > 0

- name: Build VLAN lookup filters
  include_tasks: utils_build_lookup_filters.yml
  vars:
    endpoint: "{{ endpoints.vlans }}"
    values: "{{ unique_vlans }}"
    result_var: "vlans_lookup_filters"

- name: Upsert VLANs in bulk
  include_tasks: api_upsert.yml
  vars:
    endpoint: "{{ endpoints.vlans }}"
    desired_bodies: "{{ desired_vlans }}"
    unique_key: "{{ endpoints.vlans.lookup_key }}"
    lookup_filters_input: "{{ vlans_lookup_filters }}"
    result_var: "final_vlans"
    extra_lookup_filters:
      location: "{{ location.id }}"
  when: unique_vlans | length > 0 and device_id is defined

- name: Build vlan_ids map
  set_fact:
    vlan_ids: "{{ dict(unique_vlans | zip(final_vlans | map(attribute='id'))) }}"
  when: unique_vlans | length > 0

# ------------------------------------------------------------------
# Interfaces – bulk upsert (PATTERN: VRFs/VLANs)
# ------------------------------------------------------------------
- name: Initialize desired interface list
  set_fact:
    desired_interfaces: []
  when: device.interfaces | default([]) | length > 0 and device_id is defined

- name: Build desired interface bodies
  set_fact:
    desired_interfaces: "{{ desired_interfaces + [intf_body] }}"
  loop: "{{ device.interfaces | default([]) }}"
  loop_control:
    loop_var: intf
  vars:
    mode: >-
      {{ 'access' if intf.vlan is defined and intf.vlan in vlan_ids else 
         'tagged' if (intf.tagged_vlans is defined and intf.tagged_vlans | length > 0) else omit }}

    untagged_vlan: >-
      {{ {'id': vlan_ids[intf.vlan]} if (intf.vlan is defined and intf.vlan in vlan_ids) else omit }}

    tagged_vlans: >-
      {{ vlan_ids | dict2items 
         | selectattr('key', 'in', intf.tagged_vlans | default([])) 
         | map(attribute='value') 
         | list | to_yaml | from_yaml 
         | map('regex_replace', '^(.*)$', '{"id": "\\1"}') 
         | map('from_json') 
         | list if (intf.tagged_vlans is defined and intf.tagged_vlans | length > 0) else omit }}

    vrf_ref: >-
      {{ {'id': vrf_ids[intf.vrf]} if (intf.vrf is defined and intf.vrf in vrf_ids) else omit }}

    base: >-
      {{ {'device': {'id': device_id},
          'name': intf.name,
          'type': intf.type,
          'enabled': true,
          'status': nautobot_status,
          'mgmt_only': intf.mgmt_only | default(false)} }}

    intf_body: >-
      {{ base |
         combine({'mode': mode} if mode != omit else {}) |
         combine({'untagged_vlan': untagged_vlan} if untagged_vlan != omit else {}) |
         combine({'tagged_vlans': tagged_vlans} if tagged_vlans != omit else {}) |
         combine({'vrf': vrf_ref} if vrf_ref != omit else {}) }}
  when: device.interfaces | default([]) | length > 0 and device_id is defined

- name: Build interface lookup filters (by name)
  include_tasks: utils_build_lookup_filters.yml
  vars:
    endpoint: "{{ endpoints.interfaces }}"
    values: "{{ device.interfaces | map(attribute='name') | list | unique }}"
    result_var: interface_lookup_filters
  when: device.interfaces | length > 0 and device_id is defined

- name: Upsert interfaces in bulk
  include_tasks: api_upsert.yml
  vars:
    endpoint: "{{ endpoints.interfaces }}"
    desired_bodies: "{{ desired_interfaces }}"
    unique_key: "name"
    lookup_filters_input: "{{ interface_lookup_filters }}"
    result_var: "final_interfaces"
    extra_lookup_filters:
      device: "{{ device_id }}"
  when: device.interfaces | length > 0 and device_id is defined

- name: Build interface_ids map
  set_fact:
    interface_ids: "{{ dict(final_interfaces | map(attribute='name') | zip(final_interfaces | map(attribute='id'))) }}"
  when: device.interfaces | length > 0

# ------------------------------------------------------------------
# IPs – build without assignments
# ------------------------------------------------------------------
- name: Initialize desired IP list
  set_fact:
    desired_ips: []

# Primary IP
- name: Add primary IP
  set_fact:
    desired_ips: "{{ desired_ips + [primary_ip_body] }}"
  vars:
    primary_vrf: "{{ (device.interfaces | selectattr('name','equalto','mgmt') | first).vrf | default(none) }}"
    vrf_dict: "{{ {'vrf': {'id': vrf_ids[primary_vrf]}} if primary_vrf and primary_vrf in vrf_ids else {} }}"
    tenant_dict: "{{ {'tenant': {'id': tenant_ids[device.tenant]}} if device.tenant is defined and device.tenant in tenant_ids else {} }}"
    primary_ip_body: >-
      {{ {'address': device.primary_ip4,
          'namespace': nautobot_namespace,
          'status': nautobot_status} |
         combine(vrf_dict) | combine(tenant_dict) }}
  when: device.primary_ip4 is defined and 'mgmt' in interface_ids

# Interface IPs
- name: Initialize interface IP bodies list
  set_fact:
    interface_ip_bodies: []
  when: device.interfaces | default([]) | length > 0

- name: Build interface IP bodies
  set_fact:
    interface_ip_bodies: "{{ interface_ip_bodies + [ip_body] }}"
  loop: "{{ device.interfaces | default([]) | subelements('ip_addresses', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} - {{ item.1 }}"
  vars:
    intf: "{{ item.0 }}"
    ip_str: "{{ item.1 }}"
    vrf_id: "{{ vrf_ids[intf.vrf] if intf.vrf is defined and intf.vrf in vrf_ids else none }}"
    tenant_id: "{{ tenant_ids[device.tenant] if device.tenant is defined and device.tenant in tenant_ids else none }}"
    ip_body: >-
      {{ {'address': ip_str,
          'namespace': nautobot_namespace,
          'status': nautobot_status} |
         combine({'vrf': {'id': vrf_id}} if vrf_id else {}) |
         combine({'tenant': {'id': tenant_id}} if tenant_id else {}) }}
  when: device.interfaces | default([]) | length > 0

- name: Combine primary and interface IPs
  set_fact:
    desired_ips: "{{ desired_ips + interface_ip_bodies }}"
  when: interface_ip_bodies is defined

# ------------------------------------------------------------------
# Prefixes – derive from IPs, without vrf
# ------------------------------------------------------------------
- name: Get unique IP addresses
  set_fact:
    all_ip_addresses: "{{ desired_ips | map(attribute='address') | unique }}"
  when: desired_ips | length > 0

- name: Parse network prefixes
  ansible.builtin.command: >-
    python -c "import ipaddress; print(ipaddress.ip_interface('{{ item }}').network)"
  register: prefix_results
  changed_when: false
  loop: "{{ all_ip_addresses }}"
  when: all_ip_addresses | length > 0

- name: Initialize prefix list and seen tracker
  set_fact:
    desired_prefixes: []
    seen_prefixes: []
  when: prefix_results.results is defined

- name: Build unique prefix bodies and vrf map
  set_fact:
    desired_prefixes: "{{ desired_prefixes + [body] }}"
    seen_prefixes: "{{ seen_prefixes + [prefix] }}"
    prefix_vrfs: "{{ prefix_vrfs | default({}) | combine({prefix: vrf_id}) }}"
  loop: "{{ prefix_results.results }}"
  vars:
    prefix: "{{ item.stdout }}"
    matching_ip: "{{ desired_ips | selectattr('address','equalto',item.item) | first }}"
    vrf_id: "{{ matching_ip.vrf.id if matching_ip.vrf is defined else none }}"
    tenant: "{{ {'tenant': {'id': tenant_ids[device.tenant]}} if device.tenant is defined and device.tenant in tenant_ids else {} }}"
    body: >-
      {{ {'prefix': prefix,
          'namespace': nautobot_namespace,
          'status': nautobot_status} |
         combine(tenant) }}
  when: prefix_results.results is defined and prefix not in seen_prefixes

- name: Build prefix lookup filters
  include_tasks: utils_build_lookup_filters.yml
  vars:
    endpoint: "{{ endpoints.prefixes }}"
    values: "{{ desired_prefixes | map(attribute='prefix') | list }}"
    result_var: prefix_lookup_filters
  when: desired_prefixes | length > 0

- name: Upsert prefixes in bulk
  include_tasks: api_upsert.yml
  vars:
    endpoint: "{{ endpoints.prefixes }}"
    desired_bodies: "{{ desired_prefixes }}"
    unique_key: "prefix"
    lookup_filters_input: "{{ prefix_lookup_filters }}"
    result_var: final_prefixes
  when: desired_prefixes | length > 0

- name: Build prefix_ids map
  set_fact:
    prefix_ids: "{{ dict(final_prefixes | map(attribute='prefix') | zip(final_prefixes | map(attribute='id'))) }}"
  when: desired_prefixes | length > 0

# ------------------------------------------------------------------
# Prefixes – derive from IPs, without vrf
# ------------------------------------------------------------------
- name: Get unique IP addresses
  set_fact:
    all_ip_addresses: "{{ desired_ips | map(attribute='address') | unique }}"
  when: desired_ips | length > 0

- name: Parse network prefixes
  ansible.builtin.command: >-
    python -c "import ipaddress; print(ipaddress.ip_interface('{{ item }}').network)"
  register: prefix_results
  changed_when: false
  loop: "{{ all_ip_addresses }}"
  when: all_ip_addresses | length > 0

- name: Initialize prefix list and seen tracker
  set_fact:
    desired_prefixes: []
    seen_prefixes: []
  when: prefix_results.results is defined

- name: Build unique prefix bodies and vrf map
  set_fact:
    desired_prefixes: "{{ desired_prefixes + [body] }}"
    seen_prefixes: "{{ seen_prefixes + [prefix] }}"
    prefix_vrfs: "{{ prefix_vrfs | default({}) | combine({prefix: vrf_id}) }}"
  loop: "{{ prefix_results.results }}"
  vars:
    prefix: "{{ item.stdout }}"
    matching_ip: "{{ desired_ips | selectattr('address','equalto',item.item) | first }}"
    vrf_id: "{{ matching_ip.vrf.id if matching_ip.vrf is defined else none }}"
    tenant: "{{ {'tenant': {'id': tenant_ids[device.tenant]}} if device.tenant is defined and device.tenant in tenant_ids else {} }}"
    body: >-
      {{ {'prefix': prefix,
          'namespace': nautobot_namespace,
          'status': nautobot_status} |
         combine(tenant) }}
  when: prefix_results.results is defined and prefix not in seen_prefixes

- name: Build prefix lookup filters
  include_tasks: utils_build_lookup_filters.yml
  vars:
    endpoint: "{{ endpoints.prefixes }}"
    values: "{{ desired_prefixes | map(attribute='prefix') | list }}"
    result_var: prefix_lookup_filters
  when: desired_prefixes | length > 0

- name: Upsert prefixes in bulk
  include_tasks: api_upsert.yml
  vars:
    endpoint: "{{ endpoints.prefixes }}"
    desired_bodies: "{{ desired_prefixes }}"
    unique_key: "prefix"
    lookup_filters_input: "{{ prefix_lookup_filters }}"
    result_var: final_prefixes
  when: desired_prefixes | length > 0

- name: Build prefix_ids map
  set_fact:
    prefix_ids: "{{ prefix_ids | default({}) | combine({item.prefix: item.id}) }}"
  loop: "{{ final_prefixes }}"
  when: final_prefixes | length > 0

# ------------------------------------------------------------------
# Prefix-VRF assignments – bulk upsert
# ------------------------------------------------------------------
- name: Initialize desired_prefix_assignments
  set_fact:
    desired_prefix_assignments: []
  when: prefix_vrfs is defined and prefix_vrfs | length > 0

- name: Build desired Prefix-VRF assignment bodies
  set_fact:
    desired_prefix_assignments: >-
      {{ desired_prefix_assignments + [ {
          'prefix': {'id': prefix_ids[item.key]},
          'vrf': {'id': item.value}
        } ] }}
  loop: "{{ prefix_vrfs | dict2items }}"
  loop_control:
    loop_var: item
  when: item.value is not none

- name: Build Prefix-VRF assignment lookup filters (by prefix id)
  include_tasks: utils_build_lookup_filters.yml
  vars:
    values: "{{ final_prefixes | map(attribute='id') | list }}"
    override_key: "prefix"
    result_var: prefix_assign_lookup_filters
  when: desired_prefix_assignments | length > 0

- name: Upsert Prefix-VRF assignments in bulk
  include_tasks: api_upsert.yml
  vars:
    endpoint: "{{ endpoints.vrf_prefix_assignments }}"
    desired_bodies: "{{ desired_prefix_assignments }}"
    unique_key: "prefix.id"
    lookup_filters_input: "{{ prefix_assign_lookup_filters }}"
    result_var: final_prefix_assignments
  when: desired_prefix_assignments | length > 0

# ------------------------------------------------------------------
# IPs – bulk upsert without assignments
# ------------------------------------------------------------------
- name: Build IP lookup filters
  include_tasks: utils_build_lookup_filters.yml
  vars:
    endpoint: "{{ endpoints.ip_addresses }}"
    values: "{{ desired_ips | map(attribute='address') | unique | list }}"
    result_var: ip_lookup_filters
  when: desired_ips | length > 0

- name: Upsert IP addresses in bulk
  include_tasks: api_upsert.yml
  vars:
    endpoint: "{{ endpoints.ip_addresses }}"
    desired_bodies: "{{ desired_ips }}"
    unique_key: "address"
    lookup_filters_input: "{{ ip_lookup_filters }}"
    extra_lookup_filters:
      namespace: "{{ nautobot_namespace }}"
    result_var: final_ips
  when: desired_ips | length > 0

- name: Build ip_ids map
  set_fact:
    ip_ids: "{{ dict(final_ips | map(attribute='address') | zip(final_ips | map(attribute='id'))) }}"
  when: desired_ips | length > 0

# ------------------------------------------------------------------
# IP-Interface assignments – bulk upsert
# ------------------------------------------------------------------
- name: Build ip_to_intf map from interface ip_addresses
  set_fact:
    ip_to_intf: >-
      {{
        dict(
          device.interfaces | default([]) |
          map('json_query', '[].{ip: ip_addresses[], intf: name}') |
          flatten |
          rejectattr('ip', 'none') |
          map('json_query', '[*].{ip: ip, intf: interface_ids[intf]}') |
          flatten |
          map('json_query', '[*].{key: ip, value: intf}') |
          items2dict
        )
      }}
  when:
    - device.interfaces is defined
    - interface_ids is defined

# Build lookup filters for the *ip_address* side (the endpoint supports filtering by ip_address)
- name: Build IP-assignment lookup filters (by ip_address id)
  include_tasks: utils_build_lookup_filters.yml
  vars:
    values: "{{ final_ips | map(attribute='id') | list }}"
    override_key: "ip_address"
    result_var: ip_assign_lookup_filters
  when: desired_ip_assignments | default([]) | length > 0

# ------------------------------------------------------------------
# IP-Interface assignments – bulk upsert (with is_primary for ansible_host)
# ------------------------------------------------------------------

# ------------------------------------------------------------------
# 1. Determine the primary IP (prefer device.primary_ip4, fallback to ansible_host)
# ------------------------------------------------------------------
- name: Resolve primary IP address
  set_fact:
    resolved_primary_ip: >-
      {% if device.primary_ip4 is defined and (device.primary_ip4 | trim | nautobot_is_ip) %}
        {{ device.primary_ip4 | trim }}
      {% elif ansible_host is defined and (ansible_host | trim | nautobot_is_ip) %}
        {{ ansible_host | trim }}
      {% else %}
        {{ none }}
      {% endif %}

# ------------------------------------------------------------------
# 2. Build ip_to_intf map (interface IPs + primary if mgmt exists)
# ------------------------------------------------------------------
- name: Initialize IP to interface map
  set_fact:
    ip_to_intf: {}

- name: Add interface IPs to map
  set_fact:
    ip_to_intf: "{{ ip_to_intf | combine({item.1: interface_ids[item.0.name]}) }}"
  loop: "{{ device.interfaces | default([]) | subelements('ip_addresses', skip_missing=True) }}"
  loop_control:
    loop_var: item
  when:
    - device.interfaces is defined
    - item.0.name in interface_ids
    - item.1 | trim | nautobot_is_ip

- name: Add primary IP to mgmt interface if applicable
  set_fact:
    ip_to_intf: >-
      {{ ip_to_intf | combine({resolved_primary_ip: interface_ids['mgmt']}) }}
  when:
    - resolved_primary_ip is not none
    - "'mgmt' in interface_ids"
    - resolved_primary_ip not in ip_to_intf

# ------------------------------------------------------------------
# 3. Build desired assignment bodies (with is_primary for primary IP)
# ------------------------------------------------------------------
- name: Initialize desired_ip_assignments
  set_fact:
    desired_ip_assignments: []

- name: Build desired IP-Interface assignment bodies
  set_fact:
    desired_ip_assignments: "{{ desired_ip_assignments + [assign_body] }}"
  vars:
    assign_body: >-
      {{
        {
          'ip_address': {'id': ip_ids[ip_str]},
          'interface':  {'id': intf_id},
          'is_primary': (ip_str == resolved_primary_ip)
        }
      }}
  loop: "{{ ip_to_intf | dict2items }}"
  loop_control:
    loop_var: item
  vars:
    ip_str: "{{ item.key }}"
    intf_id: "{{ item.value }}"
  when:
    - ip_str in ip_ids
    - ip_str | trim | nautobot_is_ip

# ------------------------------------------------------------------
# 4. Build lookup filters by ip_address.id
# ------------------------------------------------------------------
- name: Build IP-assignment lookup filters (by ip_address id)
  include_tasks: utils_build_lookup_filters.yml
  vars:
    values: "{{ final_ips | map(attribute='id') | list }}"
    override_key: "ip_address"
    result_var: ip_assign_lookup_filters
  when: desired_ip_assignments | default([]) | length > 0

# ------------------------------------------------------------------
# 5. Bulk UPSERT assignments (create + update is_primary)
# ------------------------------------------------------------------
- name: Upsert IP-Interface assignments in bulk (with is_primary)
  include_tasks: api_upsert.yml
  vars:
    endpoint: "{{ endpoints.ip_address_to_interface }}"
    desired_bodies: "{{ desired_ip_assignments }}"
    unique_key: "ip_address.id"
    lookup_filters_input: "{{ ip_assign_lookup_filters }}"
    result_var: final_ip_assignments
  when: desired_ip_assignments | default([]) | length > 0

# ------------------------------------------------------------------
# 6. (Optional) Debug
# ------------------------------------------------------------------
- name: Debug IP-Interface assignments
  debug:
    msg: |
      IP-Interface assignments:
        Total desired: {{ desired_ip_assignments | length }}
        Primary IP: {{ resolved_primary_ip | default('none') }}
        Assigned to mgmt: {{ "'mgmt' in interface_ids" }}
  when: nautobot_discovery_debug | default(false)