# roles/nautobot_discovery/tasks/process_device.yml
---
- name: Load endpoints
  include_vars:
    file: vars/endpoints.yml

- include_tasks: process_manufacturer.yml
- include_tasks: process_platform.yml
- include_tasks: process_role.yml
- include_tasks: process_device_type.yml
- include_tasks: process_tenant.yml
  when: device.tenant is defined
- include_tasks: process_software_version.yml
  when: device.software_version is defined
- include_tasks: process_location.yml
  when: device.location is defined
- include_tasks: process_rack.yml
  when: device.rack is defined

- name: Reset tag_ids for this device
  set_fact:
    tag_ids: []
  when: device.tags | length > 0

- include_tasks: process_tag.yml
  loop: "{{ device.tags | default([]) | unique }}"
  loop_control:
    loop_var: tag_name
  when: device.tags | length > 0

- name: Lookup existing device
  include_tasks: api_lookup.yml
  vars:
    endpoint: "{{ endpoints.devices }}"
    filters:
      serial: "{{ device.serial_number }}"
      name: "{{ device.name }}"
    var_name: device_list

- name: Set existing device
  set_fact:
    device_obj: "{{ device_list[0] if device_list | length > 0 else {} }}"

- name: Set tags list
  set_fact:
    tags_list: >-
      {{ tag_ids | default([]) |
         map('regex_replace', '^(.*)$', '{"id": "\1"}') |
         map('from_json') | list }}

- name: Create or update device
  include_tasks: api_create_or_update.yml
  vars:
    endpoint: "{{ endpoints.devices }}"
    obj_id: "{{ device_obj.id | default(omit) }}"
    body:
      name: "{{ device.name }}"
      serial: "{{ device.serial_number }}"
      device_type: { "id": "{{ device_type.id }}" }
      role: { "id": "{{ role.id }}" }
      platform: { "id": "{{ platform.id }}" }
      location: { "id": "{{ location.id | default(omit) }}" }
      status: "{{ device.status | default(nautobot_status) }}"
      custom_fields: "{{ device.custom_fields | default({}) }}"
      tags: "{{ tags_list }}"
      asset_tag: "{{ device.asset_tag | default(omit) }}"
      rack: { "id": "{{ rack.id | default(omit) }}" }
      position: "{{ device.position | default(omit) }}"
      face: "{{ device.face | default(omit) }}"
      tenant: { "id": "{{ tenant.id | default(omit) }}" }
      software_version: { "id": "{{ software_version.id | default(omit) }}" }
      comments: "{{ device.comments | default('') }}"
    var_name: device_obj

- name: Set device_id
  set_fact:
    device_id: "{{ device_obj.id }}"

# ------------------------------------------------------------------
# Namespace handling (renamed to avoid reserved name)
# ------------------------------------------------------------------
- name: Lookup or create namespace
  block:
    - include_tasks: api_lookup.yml
      vars:
        endpoint: "{{ endpoints.namespaces }}"
        filters:
          name: "{{ nautobot_namespace }}"
        var_name: namespace_list

    - name: Set namespace object
      set_fact:
        namespace_obj: "{{ namespace_list[0] if namespace_list | length > 0 else {} }}"

    - include_tasks: api_create_or_update.yml
      vars:
        endpoint: "{{ endpoints.namespaces }}"
        obj_id: omit
        body:
          name: "{{ nautobot_namespace }}"
          description: ""
        var_name: namespace_obj
      when: namespace_list | length == 0

# ------------------------------------------------------------------
# VRFs – SINGLE CALL UPSERT
# ------------------------------------------------------------------
- name: Collect unique VRFs
  set_fact:
    unique_vrfs: >-
      {{ (device.interfaces | default([]) |
          map(attribute='vrf') | select('defined') | unique +
          device.vrfs | default([])) |
         unique | select('defined') | list }}

- name: Build desired VRF bodies
  set_fact:
    desired_vrf_bodies: >-
      {{ unique_vrfs | map('community.general.dict_kv', 'name') |
         zip(unique_vrfs | map('community.general.dict_kv', 'rd')) |
         map('combine') |
         map('combine', {'namespace': {'id': namespace_obj.id}}) |
         list }}

- name: Upsert VRFs (single call)
  include_tasks: api_upsert.yml
  vars:
    endpoint_name: "vrfs"
    desired_bodies: "{{ desired_vrf_bodies }}"
    result_var: final_vrfs
    extra_lookup_filters:
      namespace: "{{ namespace_obj.id }}"
  when: unique_vrfs | length > 0

- name: Build vrf_ids map
  set_fact:
    vrf_ids: "{{ dict(unique_vrfs | zip(final_vrfs | map(attribute='id'))) }}"
  when: unique_vrfs | length > 0

# ------------------------------------------------------------------
# VRF-to-Device Assignments – REQUIRED BEFORE INTERFACES
# ------------------------------------------------------------------
- name: Build VRF-to-Device assignment bodies
  set_fact:
    desired_vrf_assignments: []
  when: unique_vrfs | length > 0

- name: Add VRF-to-Device assignments
  set_fact:
    desired_vrf_assignments: >-
      {{ desired_vrf_assignments + [
           {
             'vrf': {'id': vrf_ids[item]},
             'device': {'id': device_id},
             'name': item + '-updated',
             'rd': item + '-updated'
           }
         ] }}
  loop: "{{ unique_vrfs }}"
  loop_control:
    loop_var: item
  when: unique_vrfs | length > 0

- name: Upsert VRF-to-Device assignments
  include_tasks: api_upsert.yml
  vars:
    endpoint_name: "vrf_device_assignments"
    desired_bodies: "{{ desired_vrf_assignments }}"
    result_var: final_vrf_assignments
    extra_lookup_filters:
      device: "{{ device_id }}"
  when: unique_vrfs | length > 0

# ------------------------------------------------------------------
# VLANs – SINGLE CALL UPSERT (FIXED)
# ------------------------------------------------------------------
- name: Collect unique VLANs
  set_fact:
    unique_vlans: >-
      {{
        (device.vlans | default([])) +
        (device.interfaces | default([]) | map(attribute='vlan') | select('defined') | list)
        | unique | list
      }}
  when: device.vlans is defined or (device.interfaces is defined and device.interfaces | length > 0)

- name: Build desired VLAN bodies
  set_fact:
    desired_vlan_bodies: >-
      [{% for v in unique_vlans | unique %}
        {
          "name": "{{ v }}",
          "vid": {{ loop.index }},
          "location": {"id": "{{ location.id }}"},
          "status": "{{ nautobot_status }}"
        }{% if not loop.last %},{% endif %}
      {% endfor %}]
  when: unique_vlans | length > 0

- name: Upsert VLANs (single call)
  include_tasks: api_upsert.yml
  vars:
    endpoint_name: "vlans"
    desired_bodies: "{{ desired_vlan_bodies }}"
    result_var: final_vlans
    extra_lookup_filters:
      location: "{{ location.id }}"
  when: unique_vlans | length > 0

- name: Build vlan_ids map (name → id)
  set_fact:
    vlan_ids: "{{ dict(unique_vlans | zip(final_vlans | map(attribute='id'))) }}"
  when: unique_vlans | length > 0

## ------------------------------------------------------------------
## Interfaces – SINGLE CALL UPSERT
## ------------------------------------------------------------------
- name: Build desired interface bodies
  set_fact:
    desired_interfaces: >-
      {{ device.interfaces | default([]) | map('combine', {
           'device': {'id': device_id},
           'enabled': true,
           'status': nautobot_status
         }) | list }}
  when: device.interfaces is defined and device.interfaces | length > 0

- name: Resolve VRF and VLAN IDs for interfaces
  set_fact:
    desired_interfaces: >-
      {{ desired_interfaces | map('combine', {
           'vrf': {'id': vrf_ids[item.vrf]} if item.vrf is defined and item.vrf in vrf_ids else omit,
           'vlan': {'id': vlan_ids[item.vlan]} if item.vlan is defined and item.vlan in vlan_ids else omit
         }) | list }}
  loop: "{{ desired_interfaces }}"
  loop_control:
    loop_var: item
  when: device.interfaces is defined and device.interfaces | length > 0

- name: Upsert Interfaces
  include_tasks: api_upsert.yml
  vars:
    endpoint_name: "interfaces"
    desired_bodies: "{{ desired_interfaces }}"
    result_var: final_interfaces
    extra_lookup_filters:
      device: "{{ device_id }}"
  when: device.interfaces is defined and device.interfaces | length > 0

- name: Build interface_ids map
  set_fact:
    interface_ids: "{{ dict(device.interfaces | default([]) | map(attribute='name') | list | zip(final_interfaces | map(attribute='id'))) }}"
  when: device.interfaces is defined and device.interfaces | length > 0

# ------------------------------------------------------------------
# Prefixes – BULK UPSERT (dynamic chunking, pure-plugin)
# ------------------------------------------------------------------

- name: Initialize all_interface_ips (flatten every interface.ip_addresses)
  set_fact:
    all_interface_ips: >-
      {{ (device.interfaces | default([]))
         | json_query('[*].ip_addresses[]')
         | flatten
         | default([])
         | list }}

- name: Extract unique *parent* prefixes (10.0.2.0/24, …)
  set_fact:
    unique_prefixes: "{{ all_interface_ips | extract_parent_prefixes }}"
  when: all_interface_ips | length > 0

- name: Build desired prefix bodies (namespace + status + optional tenant)
  set_fact:
    desired_prefix_bodies: >-
      {{ unique_prefixes
         | build_prefix_bodies(
               namespace_obj.id,
               nautobot_status,
               tenant.id | default(omit)   
           ) }}
  when: unique_prefixes | length > 0

- name: Bulk-upsert prefixes
  include_tasks: api_upsert.yml
  vars:
    endpoint_name: "prefixes"
    desired_bodies: "{{ desired_prefix_bodies }}"
    result_var: final_prefixes
    extra_lookup_filters:
      namespace: "{{ namespace_obj.id }}"
  when: desired_prefix_bodies | default([]) | length > 0

## ------------------------------------------------------------------
## IP Addresses – BULK UPSERT (ZERO JINJA2)
## ------------------------------------------------------------------

- name: Build IP upsert data via plugin
  set_fact:
    ip_upsert_data: >-
      {{ device
         | build_ip_upsert_bodies_from_device(
               namespace_obj.id,
               nautobot_status,
               tenant.id | default(none),
               vrf_ids | default({})
           ) }}

- name: Upsert IP addresses
  include_tasks: api_upsert.yml
  vars:
    endpoint_name: "ip_addresses"
    desired_bodies: "{{ ip_upsert_data.bodies }}"
    result_var: final_ip_addresses
    extra_lookup_filters:
      namespace: "{{ namespace_obj.id }}"
  when: ip_upsert_data.bodies | length > 0

- name: Build ip_id_map from results
  set_fact:
    ip_id_map: >-
      {{ dict(
           ip_upsert_data.bodies
           | map(attribute='address')
           | zip(final_ip_addresses | map(attribute='id'))
         ) }}
  when: final_ip_addresses is defined


# ------------------------------------------------------------------
# IP Address to Interface Assignments – BULK UPSERT
# ------------------------------------------------------------------

- name: Initialize ip_to_interface_bodies
  set_fact:
    ip_to_interface_bodies: []

- name: Build IP-to-Interface assignment bodies
  include_tasks: assign_ip_to_interface.yml
  loop: "{{ device.interfaces | default([]) }}"
  loop_control:
    loop_var: intf
  when:
    - intf.ip_addresses is defined
    - intf.ip_addresses | length > 0
    - ip_id_map is defined
    - interface_ids is defined
    - intf.name in interface_ids

- name: Deduplicate assignments
  set_fact:
    ip_to_interface_bodies: "{{ ip_to_interface_bodies | unique }}"

- name: Upsert IP-to-Interface relationships
  include_tasks: api_upsert.yml
  vars:
    endpoint_name: "ip_address_to_interface"
    desired_bodies: "{{ ip_to_interface_bodies }}"
    result_var: final_ip_assignments
  when: ip_to_interface_bodies | length > 0

# ------------------------------------------------------------------
# FINAL STEP: Assign primary_ip4 to device (AFTER IP-to-interface assignment)
# ------------------------------------------------------------------
- name: Resolve primary_ip4 ID from ip_id_map (must exist and be assigned)
  set_fact:
    primary_ip4_id: "{{ ip_id_map[device.primary_ip4] | default(none) }}"
  when:
    - device.primary_ip4 is defined
    - device.primary_ip4 in ip_id_map

- name: Create or update device
  include_tasks: api_create_or_update.yml
  vars:
    endpoint: "{{ endpoints.devices }}"
    obj_id: "{{ device_obj.id | default(omit) }}"
    body:
      name: "{{ device.name }}"
      serial: "{{ device.serial_number }}"
      device_type: { "id": "{{ device_type.id }}" }
      role: { "id": "{{ role.id }}" }
      platform: { "id": "{{ platform.id }}" }
      "primary_ip4": { "id": "{{ primary_ip4_id }}" }
      location: { "id": "{{ location.id | default(omit) }}" }
      status: "{{ device.status | default(nautobot_status) }}"
      custom_fields: "{{ device.custom_fields | default({}) }}"
      tags: "{{ tags_list }}"
      asset_tag: "{{ device.asset_tag | default(omit) }}"
      rack: { "id": "{{ rack.id | default(omit) }}" }
      position: "{{ device.position | default(omit) }}"
      face: "{{ device.face | default(omit) }}"
      tenant: { "id": "{{ tenant.id | default(omit) }}" }
      software_version: { "id": "{{ software_version.id | default(omit) }}" }
      comments: "{{ device.comments | default('') }}"
    var_name: device_obj
    when:
      - device.primary_ip4 is defined
      - device.primary_ip4 in ip_id_map