---
# EXPECTS:
#   lookup_endpoint
#   lookup_desired_bodies
#   lookup_unique_keys
#   lookup_result_var

- name: Build lookup filters
  set_fact:
    lookup_filters: "{{ lookup_desired_bodies | build_lookup_filters(lookup_unique_keys, lookup_endpoint.relationships | default({})) }}"

- name: Chunk filters
  set_fact:
    lookup_chunks: "{{ lookup_filters | smart_chunk_for_lookup(1500) }}"
  when: lookup_filters | length > 0

- name: GET each chunk
  ansible.builtin.uri:
    url: "{{ _api_base_url }}{{ lookup_endpoint.path }}?{{ item | map('build_filter_param') | join('&') }}"
    method: GET
    headers: "{{ _api_headers }}"
    validate_certs: "{{ nautobot_validate_certs | default(false) }}"
    return_content: yes
    status_code: 200
  loop: "{{ lookup_chunks | default([]) }}"
  register: lookup_raw

- name: Flatten results
  set_fact:
    "{{ lookup_result_var }}": >-
      {{ (lookup_raw.results | default([]))
         | selectattr('status','==',200)
         | map(attribute='json.results')
         | flatten
         | default([]) }}