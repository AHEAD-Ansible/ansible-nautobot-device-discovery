---
- name: Gather Facts from Palo Alto Firewalls
  hosts: palo_alto_group
  gather_facts: no
  collections:
    - paloaltonetworks.panos
  vars:
    provider:
      ip_address: "{{ ansible_host }}"
      username: "{{ ansible_user }}"
      password: "{{ ansible_password }}"
      api_key: "{{ ansible_api_key | default(omit) }}"
  tasks:
    - name: Fetch management IP
      panos_op:
        provider: "{{ provider }}"
        cmd: "show interface management"
      register: mgmt_ip_result
      ignore_errors: true
      delegate_to: localhost

    - name: Parse management IP and netmask
      set_fact:
        mgmt_ip_raw: "{{ (mgmt_ip_result.stdout | from_json).response.result.info.ip | default('') | trim }}"
        mgmt_netmask: "{{ (mgmt_ip_result.stdout | from_json).response.result.info.netmask | default('') | trim }}"
      when: mgmt_ip_result.stdout is defined and not mgmt_ip_result.failed
      delegate_to: localhost

    - name: Convert netmask to CIDR prefix
      command: python -c "import ipaddress; netmask = '{{ mgmt_netmask }}'; prefix = sum([bin(int(x)).count('1') for x in netmask.split('.')]); print(prefix)"
      register: prefix_result
      changed_when: false
      when: mgmt_netmask != ''
      delegate_to: localhost

    - name: Set management IP with CIDR notation
      set_fact:
        mgmt_ip: "{{ mgmt_ip_raw ~ '/' ~ (prefix_result.stdout | trim) if mgmt_ip_raw and prefix_result.stdout else ansible_host ~ '/24' }}"
      when: mgmt_ip_raw is defined
      delegate_to: localhost

    - name: Collect Palo Alto device information
      panos_facts:
        provider: "{{ provider }}"
        gather_subset: ['all']
      register: pa_facts
      ignore_errors: true
      delegate_to: localhost


    - name: Get all interfaces
      panos_op:
        provider: "{{ provider }}"
        cmd: "show interface all"
      register: all_intf_raw
      ignore_errors: true
      delegate_to: localhost

    - name: Collect VLAN facts
      panos_op:
        provider: "{{ provider }}"
        cmd: "show vlan all"
      register: vlan_raw
      ignore_errors: true
      delegate_to: localhost

    - name: Collect static route facts
      panos_op:
        provider: "{{ provider }}"
        cmd: '<show><routing><route></route></routing></show>'
        cmd_is_xml: true
      register: static_routes_raw
      ignore_errors: true
      delegate_to: localhost

    - name: Set system facts
      set_fact:
        hostname: "{{ pa_facts.ansible_facts.ansible_net_hostname | default(inventory_hostname) }}"
        serial_number: "{{ pa_facts.ansible_facts.ansible_net_serial | default('UNKNOWN') }}"
        model: "{{ pa_facts.ansible_facts.ansible_net_model | default('PA-Series') }}"
        software_version: "{{ pa_facts.ansible_facts.ansible_net_version | default('Unknown') }}"
      when: pa_facts.ansible_facts is defined

    - name: Initialize interfaces dictionary
      set_fact:
        intf_dict: {}

    - name: Add interfaces from facts
      set_fact:
        intf_dict: "{{ intf_dict | combine({item.name: {
            'platform_interface_type': '1000base-t' if item.name is match('^ethernet\\d+/\\d+$') else 'lag' if item.name is match('^ae\\d+$') else 'virtual' if item.name is match('^(vlan|loopback|tunnel|ethernet\\d+/\\d+\\.\\d+)$') else 'other',
            'ip_addresses': [item.ip] if item.ip and item.ip != 'N/A' else [],
            'vlan': item.tag | int | default(omit) if item.tag and item.tag != '0' else omit,
            'vrf': item.fwd | regex_replace('^vr:', '') | default(omit) if item.fwd and item.fwd != 'N/A' else omit,
            'zone': item.zone | default(omit) if item.zone and item.zone != '' else omit
        }}) }}"
      loop: "{{ (all_intf_raw.stdout | from_json).response.result.ifnet.entry | default([]) }}"
      delegate_to: localhost

    - name: Add management interface
      set_fact:
        intf_dict: "{{ intf_dict | combine({
            'management': {
                'platform_interface_type': '1000base-t',
                'ip_addresses': [ mgmt_ip ],
                'vlan': omit,
                'vrf': 'default',
                'zone': omit
            }
        }) }}"
      when: "'management' not in intf_dict"

    - name: Parse VLAN facts
      set_fact:
        ansible_net_vlans: "{{ vlan_raw.stdout | from_json | json_query('response.result.entries.entry[*].{name: name, tag: vid | int, interfaces: interfaces[*].{name: ifname, tagged: \"yes\"}}') | default([], true) }}"
      delegate_to: localhost

    - name: Parse virtual routers
      set_fact:
        ansible_net_route_domains: "{{ pa_facts.ansible_facts.ansible_net_virtual_routers | default([]) | map(attribute='vr_name') | list | default(['default']) }}"
      when: pa_facts.ansible_facts is defined

    - name: Parse static routes
      set_fact:
        static_routes: "{{ static_routes_raw.stdout | from_json | json_query('response.result.entry[*] | [?contains(flags, `A S`)].{vrf: `virtual-router`, destination: destination, next_hop: nexthop, metric: metric | string}') | default([]) }}"
      delegate_to: localhost

    - name: Build interfaces list
      set_fact:
        interfaces_list: "{{ interfaces_list | default([]) + [{
            'name': key,
            'platform_interface_type': intf_dict[key].platform_interface_type,
            'ip_addresses': intf_dict[key].ip_addresses,
            'vlan': intf_dict[key].vlan | default(omit),
            'vrf': intf_dict[key].vrf | default(omit),
            'zone': intf_dict[key].zone | default(omit)
        }] }}"
      loop: "{{ intf_dict.keys() | select('match', '^(ethernet|management).*') | list }}"
      loop_control:
        loop_var: key
      delegate_to: localhost

- name: Construct device_facts and upload to Nautobot
  hosts: localhost
  connection: local
  gather_facts: false
  pre_tasks:
    - name: Check if palo_alto_group exists
      set_fact:
        pa_group_exists: "{{ groups['palo_alto_group'] is defined and groups['palo_alto_group'] | length > 0 }}"
      run_once: true

    - name: Debug inventory group
      debug:
        msg: "Inventory group palo_alto_group: {{ groups['palo_alto_group'] | default([]) }}"
      when: pa_group_exists
      run_once: true

    - name: Fail if no hosts in palo_alto_group
      fail:
        msg: "No hosts found in palo_alto_group. Please define hosts in the inventory."
      when: not pa_group_exists
      run_once: true

    - name: Initialize device_facts
      set_fact:
        device_facts: []
      when: pa_group_exists
      run_once: true

    - name: Construct device_facts for each Palo Alto host
      set_fact:
        device_facts: "{{ device_facts + [{
            'name': hostvars[pa_host].hostname | default(pa_host),
            'serial_number': hostvars[pa_host].serial_number | default('UNKNOWN'),
            'vendor': 'Palo Alto',
            'model': hostvars[pa_host].model | default('PA-Series'),
            'device_type': 'Firewall',
            'location': hostvars[pa_host].location | default('DataCenter-West'),
            'platform': 'panos',
            'interfaces': hostvars[pa_host].interfaces_list | default([]),
            'primary_ip4': hostvars[pa_host].mgmt_ip | default(''),
            'software_version': hostvars[pa_host].software_version | default('Unknown'),
            'vrfs': hostvars[pa_host].ansible_net_route_domains | default([]),
            'vlan_details': hostvars[pa_host].ansible_net_vlans | default([], true),
            'vlans': (hostvars[pa_host].ansible_net_vlans | default([], true)) | map(attribute='name') | list,
            'static_routes': hostvars[pa_host].static_routes | default([]),
            'intf_dict': hostvars[pa_host].intf_dict | default({}),
            'rack': hostvars[pa_host].rack | default(omit),
            'position': hostvars[pa_host].position | default(omit),
            'face': hostvars[pa_host].face | default(omit),
            'tenant': hostvars[pa_host].tenant | default(omit),
            'tags': hostvars[pa_host].host_tags | default(omit),
            'comments': hostvars[pa_host].comments | default(omit)
        }] }}"
      loop: "{{ groups['palo_alto_group'] | default([]) }}"
      loop_control:
        loop_var: pa_host
      when: pa_group_exists and hostvars[pa_host] is defined


  roles:
    - role: nautobot_discovery
      vars:
        nautobot_url: "{{ nautobot_url }}"
        nautobot_token: "{{ nautobot_token }}"
        platform_name: panos
      when: pa_group_exists