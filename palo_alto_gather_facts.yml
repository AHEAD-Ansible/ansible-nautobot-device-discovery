- name: Gather Facts from Palo Alto Firewalls
  hosts: palo_alto_group
  gather_facts: no
  collections:
    - paloaltonetworks.panos
  vars:
    provider:
      ip_address: "{{ ansible_host }}"
      username: "{{ ansible_user }}"
      password: "{{ ansible_password }}"
      api_key: "{{ ansible_api_key | default(omit) }}"
  tasks:
    - name: Retrieve management interface details
      panos_op:
        provider: "{{ provider }}"
        cmd: "show interface management"
      register: mgmt_result
      ignore_errors: true
      delegate_to: localhost

    - name: Parse management IP and netmask from JSON output
      set_fact:
        mgmt_ip_raw: "{{ (mgmt_result.stdout | from_json).response.result.info.ip | default('') | trim }}"
        mgmt_netmask: "{{ (mgmt_result.stdout | from_json).response.result.info.netmask | default('') | trim }}"
      when: mgmt_result.stdout is defined and not mgmt_result.failed
      delegate_to: localhost

    - name: Convert netmask to CIDR prefix
      command: python -c "import ipaddress; print(ipaddress.ip_network('0.0.0.0/{{ mgmt_netmask }}').prefixlen)"
      register: prefix_result
      changed_when: false
      when: mgmt_netmask != ''
      delegate_to: localhost

    - name: Set management IP with CIDR notation
      set_fact:
        mgmt_ip: "{{ mgmt_ip_raw ~ '/' ~ (prefix_result.stdout | trim) if mgmt_ip_raw and prefix_result.stdout else ansible_host ~ '/32' }}"
      when: mgmt_ip_raw is defined
      delegate_to: localhost

    - name: Gather system, interface, and virtual router facts
      panos_facts:
        provider: "{{ provider }}"
        gather_subset: ['all']
      register: pa_facts
      ignore_errors: true
      delegate_to: localhost

    - name: Get all interfaces
      panos_op:
        provider: "{{ provider }}"
        cmd: "show interface all"
      register: all_intf_raw
      ignore_errors: true
      delegate_to: localhost

    - name: Initialize hw_intf_list
      set_fact:
        hw_intf_list: []
      delegate_to: localhost

    - name: Parse all interfaces (extract names like ethernet1/1)
      set_fact:
        hw_intf_list: "{{ hw_intf_list + [{'name': item.split()[0], 'platform_interface_type': 'ethernet', 'ip_addresses': [], 'vrf': 'default'}] }}"
      loop: "{{ all_intf_raw.stdout_lines | select('match', '^(eth|ethernet)') | list }}"
      delegate_to: localhost

    - name: Initialize interfaces dictionary
      set_fact:
        intf_dict: {}
      delegate_to: localhost

    - name: Merge hardware interfaces into intf_dict (add if missing)
      set_fact:
        intf_dict: "{{ intf_dict | combine({item.name: intf_dict[item.name] | default({}) | combine(item, recursive=true)}) }}"
      loop: "{{ hw_intf_list | default([]) }}"
      delegate_to: localhost

    - name: Collect VLAN facts via CLI
      panos_op:
        provider: "{{ provider }}"
        cmd: "show vlan all"
      register: vlan_raw
      ignore_errors: true
      delegate_to: localhost

    - name: Parse VLAN facts from CLI output
      set_fact:
        pa_vlans:
          vlans: "{{ vlan_raw.stdout_lines | select('match', '^vlan.*') | map('regex_replace', '^vlan\\s+(\\S+)\\s+(\\d+)\\s+(\\S+.*)', '{\"name\": \"\\1\", \"tag\": \\2, \"interfaces\": [{\"name\": \"\\3\", \"tagged\": \"yes\"}]}') | map('from_json') | list | default([]) }}"
      delegate_to: localhost

    - name: Collect static route facts via CLI/XML
      panos_op:
        provider: "{{ provider }}"
        cmd: '<show><routing><route></route></routing></show>'
        cmd_is_xml: true
      register: static_routes_raw
      ignore_errors: true
      delegate_to: localhost

    - name: Set system facts
      set_fact:
        pa_system:
          hostname: "{{ pa_facts.ansible_net_hostname | default(inventory_hostname) }}"
          serial: "{{ pa_facts.ansible_net_serial | default('UNKNOWN') }}"
          model: "{{ pa_facts.ansible_net_model | default('PA-Series') }}"
          sw_version: "{{ pa_facts.ansible_net_version | default('Unknown') }}"
      delegate_to: localhost

    - name: Set serial number
      set_fact:
        serial_number: "{{ pa_system.serial | default('UNKNOWN') }}"
      delegate_to: localhost

    - name: Set model
      set_fact:
        model: "{{ pa_system.model | default('PA-Series') }}"
      delegate_to: localhost

    - name: Set software version
      set_fact:
        software_version: "{{ pa_system.sw_version | default('Unknown') }}"
      delegate_to: localhost

    - name: Set hostname
      set_fact:
        hostname: "{{ pa_system.hostname | default(inventory_hostname) }}"
      delegate_to: localhost

    - name: Add interfaces to dictionary with platform_interface_type
      set_fact:
        intf_dict: "{{ intf_dict | combine({item.name: {
            'platform_interface_type': item.platform_interface_type | default('other'),
            'ip_addresses': item.ip | default([]) | map('regex_replace', '^(.*)$', '\\1/' ~ (item.netmask | default('255.255.255.255') | regex_replace('^.*\\/(\\d+)$', '\\1') | default('32'))) | list,
            'zone': item.zone | default(omit),
            'vrf': item.virtual_router | default('default')
        }}) }}"
      loop: "{{ all_interfaces }}"
      delegate_to: localhost

    - name: Add management IP if not included
      set_fact:
        intf_dict: >-
          {{
            intf_dict | combine({
              'management': {
                'platform_interface_type': 'ethernet',
                'ip_addresses': [ hostvars[inventory_hostname].ansible_host ~ '/24' ]
              }
            }, recursive=True)
          }}
      when: "'management' not in intf_dict"
      delegate_to: localhost

    - name: Assign VLAN tags to subinterfaces
      set_fact:
        intf_dict: "{{ intf_dict | combine({
            item.key: item.value | combine({
                'vlan': item.key.split('.')[-1] | int | default(omit)
            })
        }) }}"
      loop: "{{ intf_dict | dict2items }}"
      when: item.key is match('.*\\.\\d+')
      delegate_to: localhost

    - name: Extract static routes
      set_fact:
        static_routes: "{{ static_routes_raw.response | default('') | regex_findall(
            '<entry>.*?<virtual-router>(.*?)</virtual-router>.*?<flags>.*?S.*?</flags>.*?<destination>(.*?)</destination>.*?<nexthop><ip-address>(.*?)</ip-address></nexthop>.*?<metric>(\\d+)</metric>.*?</entry>',
            multiline=true
        ) | map('regex_replace', '^(.*)$', '{\"vrf\": \"\\1\", \"destination\": \"\\2\", \"next_hop\": \"\\3\", \"metric\": \\4}') | map('from_json') | list | default([]) }}"
      delegate_to: localhost

    - name: Build interfaces list
      set_fact:
        interfaces_list: "{{ interfaces_list | default([]) + [{
            'name': key,
            'platform_interface_type': intf_dict[key].platform_interface_type,
            'ip_addresses': intf_dict[key].ip_addresses,
            'vlan': intf_dict[key].vlan | default(omit),
            'vrf': intf_dict[key].vrf | default(omit),
            'zone': intf_dict[key].zone | default(omit)
        }] }}"
      loop: "{{ intf_dict.keys() | list }}"
      loop_control:
        loop_var: key
      delegate_to: localhost

- name: Construct device_facts and upload to Nautobot
  hosts: localhost
  connection: local
  gather_facts: false
  pre_tasks:
    - name: Debug inventory group
      debug:
        msg: "Inventory group palo_alto_group: {{ groups['palo_alto_group'] }}"
      run_once: true

    - name: Initialize device_facts
      set_fact:
        device_facts: []
      run_once: true

    - name: Construct device_facts for each Palo Alto host
      set_fact:
        device_facts: "{{ device_facts + [{
            'name': hostvars[pa_host].hostname | default(pa_host),
            'serial_number': hostvars[pa_host].serial_number | default('UNKNOWN'),
            'vendor': 'Palo Alto',
            'model': hostvars[pa_host].model | default('PA-Series'),
            'device_type': 'Firewall',
            'location': hostvars[pa_host].location | default('DataCenter-East'),
            'platform': 'panos',
            'interfaces': hostvars[pa_host].interfaces_list | default([]),
            'primary_ip4': hostvars[pa_host].mgmt_ip | default(''),
            'software_version': hostvars[pa_host].software_version | default('Unknown'),
            'vrfs': hostvars[pa_host].virtual_routers | default([]),
            'vlans': hostvars[pa_host].vlans | default([]) | map(attribute='name') | list,
            'intf_dict': hostvars[pa_host].intf_dict | default({}),
            'rack': hostvars[pa_host].rack | default(omit),
            'position': hostvars[pa_host].position | default(omit),
            'face': hostvars[pa_host].face | default(omit),
            'tenant': hostvars[pa_host].tenant | default(omit),
            'tags': hostvars[pa_host].host_tags | default(omit),
            'comments': hostvars[pa_host].comments | default(omit)
        }] }}"
      loop: "{{ groups['palo_alto_group'] }}"
      loop_control:
        loop_var: pa_host
      when: hostvars[pa_host] is defined

    - name: Debug constructed device_facts
      debug:
        var: device_facts
      run_once: true

  roles:
    - role: nautobot_discovery
      vars:
        platform_name: panos
