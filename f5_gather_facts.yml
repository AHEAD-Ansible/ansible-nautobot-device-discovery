---
- name: Gather facts from F5 BIG-IP
  hosts: f5_bigip_group
  gather_facts: no
  collections:
    - f5networks.f5_modules
  tasks:
    - name: Fetch management IP
      bigip_command:
        commands: "tmsh list sys management-ip"
        provider:
          server: "{{ ansible_host }}"
          server_port: "{{ ansible_port }}"
          user: "{{ ansible_user }}"
          password: "{{ ansible_password }}"
          validate_certs: "{{ ansible_httpapi_validate_certs }}"
      delegate_to: localhost
      register: mgmt_ip_result
      ignore_errors: true

    - name: Parse management IP
      set_fact:
        mgmt_ip: "{{ mgmt_ip_result.stdout | regex_search('management-ip (\\d+\\.\\d+\\.\\d+\\.\\d+/\\d+)', '\\1') | first | default(ansible_host) }}"

    - name: Collect BIG-IP information (interfaces, self-ips, system-info, vlans, virtual-servers)
      bigip_device_info:
        gather_subset:
          - interfaces
          - self-ips
          - system-info
          - vlans
          - virtual-servers
          - route-domains
        provider:
          server: "{{ ansible_host }}"
          server_port: "{{ ansible_port }}"
          user: "{{ ansible_user }}"
          password: "{{ ansible_password }}"
          validate_certs: "{{ ansible_httpapi_validate_certs }}"
      delegate_to: localhost
      register: f5_facts

    - name: Set shortcuts to f5_facts (for readability)
      set_fact:
        interfaces: "{{ f5_facts.interfaces | default([]) }}"
        vlans: "{{ f5_facts.vlans | default([]) }}"
        self_ips: "{{ f5_facts.self_ips | default([]) }}"
        system_info: "{{ f5_facts.system_info | default({}) }}"
        virtual_servers: "{{ f5_facts.virtual_servers | default([]) }}"

    - name: Set serial number (from system-info or fallback to mgmt MAC)
      set_fact:
        serial_number: "{{ system_info.chassis_serial | default( (interfaces | selectattr('name', 'equalto', 'mgmt') | map(attribute='mac_address') | first | default('UNKNOWN') | replace(':', '') | upper) ) }}"

    - name: Set model (from system-info or fallback)
      set_fact:
        model: "{{ system_info.marketing_name | default('BIG-IP') }}"

    - name: Set software version (from system-info or fallback)
      set_fact:
        software_version: "{{ system_info.product_version | default('Unknown') }}"

    - name: Set hostname (from system-info or fallback)
      set_fact:
        hostname: "{{ system_info.hostname | default(inventory_hostname) }}"

    - name: Initialize interfaces dict (keyed by name for easy updates)
      set_fact:
        intf_dict: {}

    - name: Add physical interfaces to dict
      set_fact:
        intf_dict: "{{ intf_dict | combine({item.name: {'platform_interface_type': item.active_media_type | default('other'), 'ip_addresses': [] }}) }}"
      loop: "{{ interfaces }}"

    - name: Add management IP to mgmt interface
      set_fact:
        intf_dict: "{{ intf_dict | combine({'mgmt': intf_dict['mgmt'] | default({'platform_interface_type': '100TX-FD', 'ip_addresses': []}) | combine({'ip_addresses': intf_dict['mgmt'].ip_addresses | default([]) + [mgmt_ip] })}) }}"
      when: "'mgmt' in intf_dict"

    - name: Add self-ips to associated physical interfaces
      set_fact:
        intf_dict: "{{ intf_dict | combine({phys_int: intf_dict[phys_int] | combine({
            'ip_addresses': intf_dict[phys_int].ip_addresses + [item.address ~ '/' ~ item.netmask_cidr] if item.address != mgmt_ip.split('/')[0] else intf_dict[phys_int].ip_addresses,
            'vlan': vlan_name,
            'vrf': (ansible_net_route_domains | selectattr('vlans', 'contains', item.vlan) | first | default({})).name | default('0')
        })}) }}"
      loop: "{{ self_ips }}"
      when: phys_int != ''
      vars:
        vlan_name: "{{ item.vlan.split('/')[-1] }}"
        vlan_obj: "{{ vlans | selectattr('name', 'equalto', vlan_name) | first | default({}) }}"
        phys_int: "{{ (vlan_obj.interfaces | default([]) | first | default({})).name | default('') }}"
      ignore_errors: true

    - name: Add VIPs as virtual interfaces
      set_fact:
        intf_dict: "{{ intf_dict | combine({vs_name: {
            'platform_interface_type': 'virtual',
            'ip_addresses': intf_dict[vs_name].ip_addresses | default([]) + [vip_ip ~ '/32'],
            'vlan': 'internal',
            'vrf': (ansible_net_route_domains | selectattr('vlans', 'contains', '/Common/internal') | first | default({})).name | default('0')
        }}) }}"
      loop: "{{ virtual_servers }}"
      vars:
        full_dest: "{{ item.destination.split('/')[-1].split(':')[0] }}"
        vip_ip: "{{ full_dest | regex_replace('%.*', '') | regex_replace('[^0-9.]', '') | trim }}"
        vs_name: "{{ 'vs_' ~ item.name.split('/')[-1] }}"
      when: vip_ip is match('\\d+\\.\\d+\\.\\d+\\.\\d+')
      ignore_errors: true

    - name: Build interfaces list
      set_fact:
        interfaces_list: "{{ interfaces_list | default([]) + [{
            'name': key,
            'platform_interface_type': intf_dict[key].platform_interface_type,
            'ip_addresses': intf_dict[key].ip_addresses,
            'vlan': intf_dict[key].vlan | default(omit),
            'vrf': intf_dict[key].vrf | default(omit)
        }] }}"
      loop: "{{ intf_dict.keys() | list }}"
      loop_control:
        loop_var: key

- name: Construct device_facts and upload to Nautobot
  hosts: localhost
  connection: local
  gather_facts: false
  pre_tasks:
    - name: Check if f5_bigip_group exists
      set_fact:
        f5_group_exists: "{{ groups['f5_bigip_group'] is defined and groups['f5_bigip_group'] | length > 0 }}"
      run_once: true

    - name: Debug inventory group
      debug:
        msg: "Inventory group f5_bigip_group: {{ groups['f5_bigip_group'] | default([]) }}"
      when: f5_group_exists
      run_once: true

    - name: Fail if no hosts in f5_bigip_group
      fail:
        msg: "No hosts found in f5_bigip_group. Please define hosts in the inventory."
      when: not f5_group_exists
      run_once: true

    - name: Initialize device_facts
      set_fact:
        device_facts: []
      when: f5_group_exists
      run_once: true

    - name: Construct device_facts for each F5 host
      set_fact:
        device_facts: "{{ device_facts + [{
            'name': hostvars[f5_host].hostname | default(f5_host),
            'serial_number': hostvars[f5_host].serial_number | default('UNKNOWN'),
            'vendor': 'F5',
            'model': hostvars[f5_host].model | default('BIG-IP'),
            'device_type': 'Load Balancer',
            'location': hostvars[f5_host].location | default('DataCenter-East'),
            'platform': 'tmos',
            'interfaces': hostvars[f5_host].interfaces_list | default([]),
            'primary_ip4': hostvars[f5_host].mgmt_ip | default(''),
            'software_version': hostvars[f5_host].software_version | default('Unknown'),
            'vrfs': hostvars[f5_host].ansible_net_route_domains | default([]) | map(attribute='name') | list,
            'vlans': hostvars[f5_host].ansible_net_vlans | default([]) | map(attribute='name') | list,
            'intf_dict': hostvars[f5_host].intf_dict | default({}),
            'rack': hostvars[f5_host].rack | default(omit),
            'position': hostvars[f5_host].position | default(omit),
            'face': hostvars[f5_host].face | default(omit),
            'tenant': hostvars[f5_host].tenant | default(omit),
            'tags': hostvars[f5_host].host_tags | default(omit),
            'comments': hostvars[f5_host].comments | default(omit)
        }] }}"
      loop: "{{ groups['f5_bigip_group'] | default([]) }}"
      loop_control:
        loop_var: f5_host
      when: f5_group_exists and hostvars[f5_host] is defined

    - name: Debug constructed device_facts
      debug:
        var: device_facts
      when: f5_group_exists
      run_once: true

  roles:
    - role: nautobot_discovery
      vars:
        platform_name: tmos
      when: f5_group_exists